  var svInput = document.createElement('input');
  svInput.type = 'text'; svInput.placeholder = 'e.g. 100';
  svInput.id = 'ent-search-value';
  searchPanel.appendChild(svLabel);
  searchPanel.appendChild(svInput);

  var goBtn = el('button', 'btn btn--s', 'Search');
  goBtn.onclick = function() { runEntitySearch(); };
  searchPanel.appendChild(goBtn);

  var searchResults = el('div', 'ent-search-results');
  searchResults.id = 'ent-search-results';
  searchPanel.appendChild(searchResults);

  listPane.appendChild(searchPanel);

  var listBody = el('div', 'ent-list-body');
  listBody.id = 'ent-list-body';
  listPane.appendChild(listBody);

  split.appendChild(listPane);

  // === Right pane: Inspector ===
  var inspPane = el('div', 'ent-inspector-pane');
  inspPane.id = 'ent-inspector';
  inspPane.innerHTML = '<div class="empty"><p>Select an entity to inspect</p></div>';
  split.appendChild(inspPane);

  $content.appendChild(split);

  if (!entityListData) {
    fetchEntityList();
  } else {
    renderEntityRows();
    if (selectedEntity) inspectEntity(selectedEntity);
  }
}

function renderEntityRows() {
  var listBody = document.getElementById('ent-list-body');
  var countSpan = document.getElementById('ent-count');
  if (!listBody || !entityListData) return;

  var filtered = entityListData;
  if (entityFilter) {
    var lf = entityFilter.toLowerCase();
    filtered = entityListData.filter(function(e) {
      return e['class'].toLowerCase().indexOf(lf) !== -1
        || (e.designer_name && e.designer_name.toLowerCase().indexOf(lf) !== -1);
    });
  }

  if (countSpan) countSpan.textContent = filtered.length + '/' + entityListData.length;

  listBody.innerHTML = '';

  // Cap for performance
  var show = filtered.slice(0, 1000);
  show.forEach(function(ent) {
    var row = el('div', 'ent-row');
    if (selectedEntity && selectedEntity.addr === ent.addr) row.classList.add('selected');

    var idxCell = el('div', 'ent-row-cell ent-row-idx', String(ent.index));
    var clsCell = el('div', 'ent-row-cell ent-row-cls');
    clsCell.textContent = ent['class'];
    if (ent.designer_name) {
      var dn = el('span', '', ' ' + ent.designer_name);
      dn.style.color = 'var(--t3)';
      dn.style.fontSize = '11px';
      clsCell.appendChild(dn);
    }
    var addrCell = el('div', 'ent-row-cell ent-row-addr', ent.addr);

    row.appendChild(idxCell);
    row.appendChild(clsCell);
    row.appendChild(addrCell);

    row.onclick = function() {
      selectedEntity = ent;
      // Update selection highlight
      var prev = listBody.querySelector('.ent-row.selected');
      if (prev) prev.classList.remove('selected');
      row.classList.add('selected');
      inspectEntity(ent);
    };

    listBody.appendChild(row);
  });

  if (filtered.length > 1000) {
    var more = el('div', 'ent-row');
    more.style.justifyContent = 'center';
    more.style.color = 'var(--t3)';
    more.style.cursor = 'default';
    var moreCell = el('div', 'ent-row-cell');
    moreCell.style.gridColumn = '1/-1';
    moreCell.style.textAlign = 'center';
    moreCell.textContent = '... ' + (filtered.length - 1000) + ' more (use filter)';
    more.appendChild(moreCell);
    listBody.appendChild(more);
  }
}

async function runEntitySearch() {
  var fieldInput = document.getElementById('ent-search-field');
  var valueInput = document.getElementById('ent-search-value');
  var resultsDiv = document.getElementById('ent-search-results');
  if (!resultsDiv) return;

  var field = fieldInput ? fieldInput.value.trim() : '';
  var value = valueInput ? valueInput.value.trim() : '';
  if (!field && !value) { resultsDiv.innerHTML = '<div style="color:var(--t3);font-size:.78rem">Enter a field name or value</div>'; return; }

  resultsDiv.innerHTML = '<div style="color:var(--t3);font-size:.78rem">Searching...</div>';

  try {
    var args = { max_results: 50 };
    if (field) args.field = field;
    if (value) args.value = value;
    var data = await liveClient.send('entity.search', args);

    resultsDiv.innerHTML = '';
    if (!data.matches || data.matches.length === 0) {
      resultsDiv.innerHTML = '<div style="color:var(--t3);font-size:.78rem">No matches</div>';
      return;
    }

    data.matches.forEach(function(m) {
      var row = el('div', 'ent-search-result');
      var valDisplay = (typeof m.field_value === 'object' && m.field_value !== null)
        ? JSON.stringify(m.field_value) : String(m.field_value);
      row.innerHTML = '<span class="sr-class">[' + m.entity_index + '] ' + m['class'] + '</span> ' +
        '<span class="sr-field">' + m.field_name + '</span>' +
        '<span class="sr-val">' + valDisplay.replace(/</g,'&lt;') + '</span>';
      row.title = m.addr;
      row.onclick = function() {
        // Select and inspect this entity
        var ent = { index: m.entity_index, addr: m.addr, 'class': m['class'] };
        selectedEntity = ent;
        inspectEntity(ent);
        // Update list selection
        var listBody = document.getElementById('ent-list-body');
        if (listBody) {
          var prev = listBody.querySelector('.ent-row.selected');
          if (prev) prev.classList.remove('selected');
        }
      };
      resultsDiv.appendChild(row);
    });

    var countLine = el('div', '');
    countLine.style.cssText = 'font-size:.72rem;color:var(--t3);margin-top:4px';
    countLine.textContent = data.count + ' match' + (data.count !== 1 ? 'es' : '');
    resultsDiv.appendChild(countLine);
  } catch(e) {
    resultsDiv.innerHTML = '<div style="color:var(--err);font-size:.78rem">' + (e.message || 'Search failed') + '</div>';
  }
}

function stopEntityInspector() {
  if (entityInspTimer) { clearInterval(entityInspTimer); entityInspTimer = null; }
  if (entityInspSubId !== null) {
    liveClient.unsubscribe(entityInspSubId).catch(function(){});
    entityInspSubId = null;
  }
  entityInspSnapshot = {};
  entityInspChanged = new Set();
  entityInspFrozen = null;
}

function inspectEntity(ent) {
  stopEntityInspector();

  var pane = document.getElementById('ent-inspector');
  if (!pane) return;
  pane.innerHTML = '';

  var ce = resolveEntityClass(ent['class']);
  var className = ce ? ce.o.name : ent['class'];
  var mod = ce ? ce.m : '';

  // Header
  var hdr = el('div', 'insp-hdr');
  hdr.appendChild(el('div', 'insp-hdr-name', className));
  var meta = el('div', 'insp-hdr-meta');
  meta.appendChild(el('span', '', 'Index: ' + ent.index));
  meta.appendChild(el('span', '', ent.addr));
  if (mod) meta.appendChild(el('span', '', mod));
  hdr.appendChild(meta);
  pane.appendChild(hdr);

  if (!ce) {
    pane.appendChild(el('div', 'empty', 'Class not in schema'));
    return;
  }

  var flat = flatFields(className);
  if (!flat.length) {
    pane.appendChild(el('div', 'empty', 'No fields'));
    return;
  }

  // Inspector toolbar: field filter, show changed, snapshot
  var inspToolbar = el('div', 'insp-toolbar');

  var fieldFilterInput = document.createElement('input');
  fieldFilterInput.type = 'text';
  fieldFilterInput.placeholder = 'Filter fields...';
  fieldFilterInput.value = entityInspFieldFilter;
  fieldFilterInput.oninput = function() {
    entityInspFieldFilter = this.value;
    applyInspectorFilters();
  };
  inspToolbar.appendChild(fieldFilterInput);

  var changedLabel = el('label', '');
  var changedCheck = document.createElement('input');
  changedCheck.type = 'checkbox';
  changedCheck.checked = entityInspShowChanged;
  changedCheck.onchange = function() {
    entityInspShowChanged = this.checked;
    applyInspectorFilters();
  };
  changedLabel.appendChild(changedCheck);
  changedLabel.appendChild(document.createTextNode(' Changed'));
  inspToolbar.appendChild(changedLabel);

  var snapBtn = el('button', 'btn btn--s', '\uD83D\uDCF7');
  snapBtn.title = 'Take snapshot — diff from this point';
  snapBtn.onclick = function() {
    entityInspFrozen = Object.assign({}, entityInspSnapshot);
    var badge = document.getElementById('insp-snap-badge');
    if (badge) badge.textContent = 'Snapshot active';
  };
  inspToolbar.appendChild(snapBtn);

  var snapClear = el('button', 'btn btn--s', '\u2715');
  snapClear.title = 'Clear snapshot';
  snapClear.onclick = function() {
    entityInspFrozen = null;
    var badge = document.getElementById('insp-snap-badge');
    if (badge) badge.textContent = '';
  };
  inspToolbar.appendChild(snapClear);

  var snapBadge = el('span', 'insp-snapshot-badge');
  snapBadge.id = 'insp-snap-badge';
  if (entityInspFrozen) snapBadge.textContent = 'Snapshot active';
  inspToolbar.appendChild(snapBadge);

  pane.appendChild(inspToolbar);

  // Group fields by definedIn class
  var groups = [];
  var groupMap = {};
  flat.forEach(function(f) {
    var key = f.definedIn || className;
    if (!groupMap[key]) {
      groupMap[key] = [];
      groups.push(key);
    }
    groupMap[key].push(f);
  });

  // Reverse so base class is first (flatFields collects own first, parent last, then sorts by offset)
  // Actually flatFields sorts by offset, so groups may interleave. Let's just iterate in order of first appearance.

  var treeWrap = el('div');
  treeWrap.id = 'ent-insp-tree';
  // Restore persisted column width
  var savedColW = localStorage.getItem('ent-insp-val-col');
  if (savedColW) treeWrap.style.setProperty('--val-col-w', savedColW + 'px');

  // Column resize header
  var resizeRow = el('div', 'insp-field insp-col-resize-wrap');
  resizeRow.style.cssText = 'border-bottom:2px solid var(--brd);font-size:.72rem;color:var(--t3);font-weight:600;user-select:none';
  var resizeLeft = el('div', 'insp-field-name', 'Field');
  resizeRow.appendChild(resizeLeft);
  var resizeRight = el('div', 'insp-field-val', 'Value');
  resizeRight.style.position = 'relative';
  var resizeHandle = el('div', 'insp-col-resize');
  resizeRight.appendChild(resizeHandle);
  resizeRow.appendChild(resizeRight);
  treeWrap.appendChild(resizeRow);

  // Drag logic for column resize
  (function() {
    var dragging = false, startX = 0, startW = 0;
    resizeHandle.addEventListener('mousedown', function(e) {
      e.preventDefault();
      dragging = true;
      startX = e.clientX;
      startW = resizeRight.getBoundingClientRect().width;
      resizeHandle.classList.add('dragging');
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    function onMove(e) {
      if (!dragging) return;
      var newW = Math.max(80, startW + (e.clientX - startX));
      treeWrap.style.setProperty('--val-col-w', newW + 'px');
    }
    function onUp(e) {
      if (!dragging) return;
      dragging = false;
      resizeHandle.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      var finalW = Math.max(80, startW + (e.clientX - startX));
      localStorage.setItem('ent-insp-val-col', String(Math.round(finalW)));
    }
  })();

  groups.forEach(function(groupName) {
    var fields = groupMap[groupName];
    var section = el('div', 'insp-section');
    section.dataset.sectionName = groupName;
    var collapsed = entityInspSections[groupName] === true;

    var sHdr = el('div', 'insp-section-hdr');
    var arrow = el('span', 'insp-section-arrow' + (collapsed ? ' collapsed' : ''), '\u25BE');
    sHdr.appendChild(arrow);
    sHdr.appendChild(document.createTextNode(groupName));
    var cnt = el('span', '', ' (' + fields.length + ')');
    cnt.style.cssText = 'font-weight:400;color:var(--t3);font-size:.75rem;margin-left:4px';
    sHdr.appendChild(cnt);
    section.appendChild(sHdr);

    var body = el('div', 'insp-section-body');
    if (collapsed) body.style.display = 'none';

    sHdr.onclick = function() {
      collapsed = !collapsed;
      entityInspSections[groupName] = collapsed;
      arrow.classList.toggle('collapsed', collapsed);
      body.style.display = collapsed ? 'none' : '';
    };

    fields.forEach(function(f) {
      var row = el('div', 'insp-field');
      row.dataset.fieldName = f.name;
      row.dataset.fieldType = f.type;

      var nameCell = el('div', 'insp-field-name');
      var offSpan = el('span', 'f-off', '0x' + f.offset.toString(16).toUpperCase());
      nameCell.appendChild(offSpan);
      nameCell.appendChild(document.createTextNode(f.name));
      var typeSpan = el('span', 'f-type');
      typeSpan.appendChild(document.createTextNode(' '));
      var tn = extractType(f.type);
      var tnMod = tn ? resolveClassMod(tn, mod) : null;
      var tnEnum = tn && enumMap ? enumMap.get(tn) : null;
      if (tn && tnMod) {
        typeSpan.appendChild(mkClassLink(tn, tnMod));
        var rest = (f.type || '').replace(tn, '').trim();
        if (rest) typeSpan.appendChild(document.createTextNode(' ' + rest));
      } else if (tn && tnEnum) {
        var ea = el('a', 'cl', tn);
        ea.href = '#enum/' + encodeURIComponent(tnEnum.m) + '/' + encodeURIComponent(tn);
        typeSpan.appendChild(ea);
        var rest = (f.type || '').replace(tn, '').trim();
        if (rest) typeSpan.appendChild(document.createTextNode(' ' + rest));
      } else {
        typeSpan.appendChild(document.createTextNode(f.type || ''));
      }
      nameCell.appendChild(typeSpan);
      row.appendChild(nameCell);

      var valCell = el('div', 'insp-field-val live-val');
      valCell.dataset.liveField = f.name;
      valCell.dataset.liveType = f.type;
      var edType = liveEditorType(f.type);
      valCell.dataset.editorType = edType;
      valCell.dataset.fieldOffset = f.offset;
      renderLiveValue(valCell, f.type, null);
      row.appendChild(valCell);

      body.appendChild(row);
    });

    section.appendChild(body);
    treeWrap.appendChild(section);
  });

  pane.appendChild(treeWrap);

  // Delegate click handler for drill-down toggles
  treeWrap.addEventListener('click', function(e) {
    var toggle = e.target.closest('.insp-drilldown-toggle');
    if (toggle) {
      e.stopPropagation();
      drillDownPointer(toggle, toggle.dataset.drillAddr, toggle.dataset.drillType, mod);
    }
  });

  // Apply any active filters
  if (entityInspFieldFilter || entityInspShowChanged) applyInspectorFilters();

  // Start live polling for this entity
  startEntityInspectorRead(ent, ce, flat);
}

async function startEntityInspectorRead(ent, ce, flat) {
  if (!liveClient.connected) return;
  var addr = ent.addr;
  var mod = ce.m;
  var className = ce.o.name;

  // Try subscription first
  try {
    var result = await liveClient.subscribe(addr, mod, className, 100, function(changes) {
      updateInspectorFields(changes, mod, className);
    });
    if (result && result.sub_id !== undefined) {
      entityInspSubId = result.sub_id;
      // Do an initial full read
      refreshEntityInspector(addr, mod, className);
      return;
    }
  } catch(e) { /* subscription not supported, fall back to polling */ }

  // Polling fallback
  refreshEntityInspector(addr, mod, className);
  entityInspTimer = setInterval(function() {
    refreshEntityInspector(addr, mod, className);
  }, 500);
}

async function refreshEntityInspector(addr, mod, className) {
  if (!liveClient.connected) { stopEntityInspector(); return; }
  try {
    var data = await liveClient.send('mem.read_object', {
      addr: addr, module: mod, 'class': className
    });
    var tree = document.getElementById('ent-insp-tree');
    if (!tree) return;
    var cells = tree.querySelectorAll('.insp-field-val[data-live-field]');
    var ref = entityInspFrozen || entityInspSnapshot;
    cells.forEach(function(td) {
      var fname = td.dataset.liveField;
      var newVal = data[fname];
      if (newVal === undefined) return;

      var newStr = JSON.stringify(newVal);
      var oldStr = ref[fname];
      var changed = oldStr !== undefined && oldStr !== newStr;

      if (!td.classList.contains('editing')) {
        renderLiveValue(td, td.dataset.liveType, newVal);
        attachInspectorEditor(td, fname, td.dataset.liveType, addr, mod, className);
      }

      if (changed) {
        entityInspChanged.add(fname);
        td.classList.remove('live-diff-flash');
        void td.offsetWidth;
        td.classList.add('live-diff-flash');
        td.title = 'Was: ' + oldStr;
        // Auto-reveal if show-changed is active
        if (entityInspShowChanged) {
          var row = td.closest('.insp-field');
          if (row) row.classList.remove('hidden-by-filter');
        }
      }

      // Only update rolling snapshot (not frozen)
      entityInspSnapshot[fname] = newStr;
    });
  } catch(e) { /* silently skip */ }
}

function updateInspectorFields(changes, mod, className) {
  var tree = document.getElementById('ent-insp-tree');
  if (!tree) return;
  var cells = tree.querySelectorAll('.insp-field-val[data-live-field]');
  cells.forEach(function(td) {
    var fname = td.dataset.liveField;
    if (changes[fname] !== undefined) {
      var change = changes[fname];
      var newVal = change['new'] !== undefined ? change['new'] : change;
      if (!td.classList.contains('editing')) {
        renderLiveValue(td, td.dataset.liveType, newVal);
        attachInspectorEditor(td, fname, td.dataset.liveType, selectedEntity ? selectedEntity.addr : '', mod, className);
      }
      td.classList.remove('live-diff-flash');
      void td.offsetWidth;
      td.classList.add('live-diff-flash');

      // Track change for show-changed filter
      entityInspChanged.add(fname);
      entityInspSnapshot[fname] = JSON.stringify(newVal);

      // Auto-reveal if show-changed is active
      if (entityInspShowChanged) {
        var row = td.closest('.insp-field');
        if (row) row.classList.remove('hidden-by-filter');
      }
    }
  });
}

function applyInspectorFilters() {
  var tree = document.getElementById('ent-insp-tree');
  if (!tree) return;
  var filter = entityInspFieldFilter.toLowerCase();

  var sections = tree.querySelectorAll('.insp-section');
  sections.forEach(function(section) {
    var rows = section.querySelectorAll('.insp-field');
    var visibleCount = 0;

    rows.forEach(function(row) {
      var fname = (row.dataset.fieldName || '').toLowerCase();
      var ftype = (row.dataset.fieldType || '').toLowerCase();
      var matchFilter = !filter || fname.indexOf(filter) !== -1 || ftype.indexOf(filter) !== -1;
      var matchChanged = !entityInspShowChanged || entityInspChanged.has(row.dataset.fieldName);
      var visible = matchFilter && matchChanged;
      row.classList.toggle('hidden-by-filter', !visible);
      if (visible) visibleCount++;
    });

    section.classList.toggle('hidden-by-filter', visibleCount === 0);
  });
}

async function drillDownPointer(toggle, addr, fieldType, module) {
  // If already expanded, collapse
  var existing = toggle.parentElement.querySelector('.insp-drilldown');
  if (existing) {
    existing.remove();
    toggle.textContent = '\u25B6 ' + addr;
    return;
  }

  toggle.textContent = '\u25BC ' + addr + ' ...';

  try {
    var result = await liveClient.send('mem.deref', {
      addr: addr, type: fieldType, module: module || '', size: 64
    });

    var container = el('div', 'insp-drilldown');

    if (result.kind === 'string') {
      var line = el('div', 'insp-drilldown-field');
      line.innerHTML = '<span class="dd-val" style="color:var(--ok)">"' +
        (result.value || '').replace(/</g,'&lt;') + '"</span>';
      container.appendChild(line);
    } else if (result.kind === 'object' && result.fields) {
      var hdr = el('div', 'insp-drilldown-field');
      hdr.innerHTML = '<span class="dd-name" style="color:var(--acc)">' + result['class'] +
        '</span> <span style="color:var(--t3);font-size:.7rem">@ ' + result.addr + '</span>';
      container.appendChild(hdr);
      Object.keys(result.fields).forEach(function(k) {
        var line = el('div', 'insp-drilldown-field');
        var val = result.fields[k];
        var display = (typeof val === 'object' && val !== null) ? JSON.stringify(val) : String(val);
        line.innerHTML = '<span class="dd-name">' + k + '</span><span class="dd-val">' +
          display.replace(/</g,'&lt;') + '</span>';
        container.appendChild(line);
      });
    } else if (result.kind === 'raw') {
      var line = el('div', 'insp-drilldown-field');
      line.textContent = result.hex || 'NULL';
      container.appendChild(line);
    }

    toggle.parentElement.appendChild(container);
    toggle.textContent = '\u25BC ' + addr;
  } catch(e) {
    toggle.textContent = '\u25B6 ' + addr + ' (error)';
  }
}

function attachInspectorEditor(td, fieldName, fieldType, addr, module, className) {
  var edType = td.dataset.editorType || liveEditorType(fieldType);

  // Read-only inspector: no write capability, only navigation

  if (edType === 'handle') {
    td.onclick = function() {
      var badge = td.querySelector('.live-handle');
      if (!badge || !entityListData) return;
      var raw = parseInt(badge.textContent.match(/ent:(\d+)/)?.[1], 10);
      if (isNaN(raw)) return;
      // Find entity by index
      var target = entityListData.find(function(e) { return e.index === raw; });
      if (target) {
        selectedEntity = target;
        renderEntityRows();
        inspectEntity(target);
        // Scroll into view
        var listBody = document.getElementById('ent-list-body');
        if (listBody) {
          var sel = listBody.querySelector('.ent-row.selected');
          if (sel) sel.scrollIntoView({ block: 'nearest' });
        }
      }
    };
    return;
  }
}

async function fetchEntityConfig() {
  if (!liveClient.connected) return;
  try {
    entityConfig = await liveClient.send('entity.config', {});
    var badge = document.getElementById('ent-config-badge');
    if (badge) {
      badge.textContent = '';
      badge.className = 'ent-config-badge' + (entityConfig.probed ? ' probed' : '');
      var label = document.createTextNode(entityConfig.probed ? '\u2713 probed' : 'fallback');
      badge.appendChild(label);
      var tip = el('span', 'ent-config-tip');
      tip.textContent = 'stride: 0x' + entityConfig.identity_stride.toString(16).toUpperCase()
        + '\nchunk_offset: 0x' + entityConfig.chunk_offset.toString(16).toUpperCase()
        + '\nchunks: ' + entityConfig.max_chunks + ' \u00D7 ' + entityConfig.chunk_size
        + '\ndesigner_name: +0x' + entityConfig.designer_name_offset.toString(16).toUpperCase()
        + '\nGES: ' + entityConfig.ges_addr;
      badge.appendChild(tip);
    }
  } catch(e) {
    conLog('warn', 'entity.config failed: ' + (e.message || e));
  }
}

async function fetchEntityList() {
  if (!liveClient.connected) return;
  if (!entityConfig) fetchEntityConfig();
  try {
    var result = await liveClient.send('entity.list', { max_chunks: 64 });
    entityListData = result.entities || [];
    var countSpan = document.getElementById('ent-count');
    if (countSpan) countSpan.textContent = entityListData.length + '';
    renderEntityRows();
  } catch(e) {
    conLog('error', 'entity.list failed: ' + (e.message || e));
    var countSpan = document.getElementById('ent-count');
    if (countSpan) countSpan.textContent = 'Error';
  }
}

function startEntityAutoRefresh() {
  stopEntityAutoRefresh();
  entityListTimer = setInterval(fetchEntityList, 2000);
}

function stopEntityAutoRefresh() {
  if (entityListTimer) { clearInterval(entityListTimer); entityListTimer = null; }
}

function updateConsoleTab() {
    var tab = document.getElementById('console-tab');
    if(tab) tab.classList.toggle('visible', !consoleOpen && !$app.classList.contains('hidden'));
}

document.getElementById('console-tab').onclick = toggleConsole;
document.getElementById('cd-hdr').onclick = toggleConsole;

function conLog(type, text) {
    consoleLog.push({ type: type, text: text, time: Date.now() });
    if(consoleLog.length > 200) consoleLog.shift();
    var body = document.getElementById('cd-body');
    if(body) {
        var line = el('div','cd-line '+type);
        var ts = new Date().toLocaleTimeString();
        line.textContent = '['+ts+'] '+text;
        body.appendChild(line);
        body.scrollTop = body.scrollHeight;
    }
}

// Console drag resize
(function(){
    var handle = document.getElementById('cd-resize');
    var drawer = document.getElementById('console-drawer');
    var dragging = false, startY = 0, startH = 0;
    handle.addEventListener('mousedown', function(e){
        e.preventDefault();
        dragging = true;
        startY = e.clientY;
        startH = drawer.offsetHeight;
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
    });
    function onMove(e){
        if(!dragging) return;
        var newH = startH + (startY - e.clientY);
        if(newH < 80) newH = 80;
        if(newH > window.innerHeight * 0.6) newH = window.innerHeight * 0.6;
        drawer.style.height = newH + 'px';
    }
    function onUp(){ dragging=false; document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); }
})();

// Console command input
document.getElementById('cd-input').addEventListener('keydown', function(e){
    if(e.key === 'Enter') { e.preventDefault(); sendConsoleCmd(); }
});
document.getElementById('cd-send').onclick = sendConsoleCmd;

async function sendConsoleCmd() {
    var inp = document.getElementById('cd-input');
    if(!inp || !inp.value.trim()) return;
    var raw = inp.value.trim();
    inp.value = '';

    conLog('req', '\u2192 ' + raw);

    if(!liveClient.connected) { conLog('error', 'Not connected'); return; }

    // Parse shorthand: "cmd arg1 arg2" or "cmd key=val"
    // First word = cmd, rest = args
    var parts = raw.split(/\s+/);
    var cmd = parts[0];
    var argsStr = parts.slice(1).join(' ');
    var args = {};

    if(argsStr) {
        // Try JSON parse first
        try { args = JSON.parse(argsStr); }
        catch(e) {
            // Try key=value pairs
            var kvPairs = argsStr.match(/(\w+)=("[^"]*"|'[^']*'|\S+)/g);
            if(kvPairs) {
                kvPairs.forEach(function(kv){
                    var eq = kv.indexOf('=');
                    var k = kv.substring(0,eq);
                    var v = kv.substring(eq+1).replace(/^["']|["']$/g,'');
                    if(!isNaN(Number(v)) && v!=='') args[k] = Number(v);
                    else if(v==='true') args[k] = true;
                    else if(v==='false') args[k] = false;
                    else args[k] = v;
                });
            } else {
                // Single positional arg — try common patterns
                if(cmd === 'schema.search') args = { query: argsStr };
                else if(cmd === 'mem.read') {
                    var readParts = argsStr.split(/\s+/);
                    args = { addr: readParts[0], size: parseInt(readParts[1])||64 };
                } else if(cmd === 'schema.class' || cmd === 'schema.enum') {
                    var dotParts = argsStr.split(/[:.]+/);
                    if(dotParts.length >= 2) args = { module: dotParts[0], name: dotParts.slice(1).join('::') };
                    else args = { name: argsStr };
                } else {
                    args = { query: argsStr };
                }
            }
        }
    }

    try {
        var result = await liveClient.send(cmd, args);
        var resultStr = JSON.stringify(result, null, 2);
        if(resultStr.length > 500) resultStr = resultStr.substring(0,500) + '... (truncated)';
        conLog('res', '\u2190 ' + resultStr);
    } catch(e) {
        conLog('error', e.message);
    }
}

// Show console tab when app is visible
var appObserver = new MutationObserver(function(){ updateConsoleTab(); });
appObserver.observe($app, { attributes: true, attributeFilter: ['class'] });
</script>
