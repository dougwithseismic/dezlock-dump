<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dezlock-dump viewer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0d1117;--bg1:#161b22;--bg2:#1c2128;--bg-h:#1f2937;--bg-a:#253040;
  --t1:#e6edf3;--t2:#8b949e;--t3:#6e7681;
  --acc:#e85d75;--acc-h:#f47089;--acc-d:rgba(232,93,117,.15);
  --link:#58a6ff;--link-h:#79c0ff;
  --brd:#30363d;--brd-l:#21262d;
  --code:#0a0e14;--badge:#30363d;--badge-t:#8b949e;
  --ok:#3fb950;--warn:#d29922;
  --r:6px;--rs:4px;
  --mono:'Cascadia Code','JetBrains Mono','Fira Code','Consolas',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  --side:300px;--hdr:48px;
}
[data-theme="light"]{
  --bg0:#fff;--bg1:#f6f8fa;--bg2:#eef1f5;--bg-h:#e8ecf0;--bg-a:#dce1e8;
  --t1:#1f2328;--t2:#57606a;--t3:#8b949e;
  --acc:#cf222e;--acc-h:#e53e4e;--acc-d:rgba(207,34,46,.08);
  --link:#0969da;--link-h:#0550ae;
  --brd:#d0d7de;--brd-l:#e8ecf0;
  --code:#f0f3f6;--badge:#e8ecf0;--badge-t:#57606a;
}
html,body{height:100%;font-family:var(--sans);font-size:14px;line-height:1.5;color:var(--t1);background:var(--bg0);overflow:hidden}
a{color:var(--link);text-decoration:none}a:hover{color:var(--link-h);text-decoration:underline}
code{font-family:var(--mono);font-size:.9em;background:var(--code);padding:1px 5px;border-radius:var(--rs)}
.hidden{display:none!important}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}

/* Landing */
.landing{display:flex;align-items:center;justify-content:center;height:100vh}
.landing-content{text-align:center;max-width:480px;padding:24px}
.landing-title{font-size:2rem;font-weight:700;font-family:var(--mono);margin-bottom:8px}
.landing-sub{font-size:1rem;color:var(--t2);margin-bottom:32px}
.drop-zone{border:2px dashed var(--brd);border-radius:12px;padding:48px 32px;cursor:pointer;transition:border-color .2s,background .2s}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--acc);background:var(--acc-d)}
.dz-icon{color:var(--t3);margin-bottom:16px}
.drop-zone.drag-over .dz-icon{color:var(--acc)}
.dz-text{font-size:1.1rem;color:var(--t2);margin-bottom:8px}
.dz-or{font-size:.85rem;color:var(--t3);margin-bottom:12px}
.btn{display:inline-block;padding:8px 20px;background:var(--acc);color:#fff;border:none;border-radius:var(--r);font-size:.9rem;font-weight:600;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--acc-h)}
.btn--s{padding:4px 12px;font-size:.8rem}
.load-ind{margin-top:32px}
.load-bar{width:100%;height:4px;background:var(--brd);border-radius:2px;overflow:hidden}
.load-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .3s}
.load-status{margin-top:12px;font-size:.85rem;color:var(--t2)}

/* Landing live connect */
.landing-divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:var(--t3);font-size:.85rem}
.landing-divider::before,.landing-divider::after{content:'';flex:1;height:1px;background:var(--brd)}
.landing-live{display:flex;align-items:center;gap:8px;justify-content:center}
.landing-live input{font-family:var(--mono);font-size:.85rem;padding:6px 10px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rs);color:var(--t1);width:220px;text-align:center}
.landing-live input:focus{border-color:var(--acc);outline:none}

/* App */
.app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;height:var(--hdr);padding:0 16px;background:var(--bg1);border-bottom:1px solid var(--brd);flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-r{display:flex;align-items:center;gap:8px}
.hdr-title{font-family:var(--mono);font-size:1rem;font-weight:700;color:var(--acc)}
.hdr-info{font-size:.8rem;color:var(--t3)}
.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:none;border:1px solid var(--brd);border-radius:var(--rs);color:var(--t2);cursor:pointer}
.icon-btn:hover{color:var(--t1);border-color:var(--t3)}
.app-body{display:flex;flex:1;overflow:hidden;position:relative}

/* Header live controls */
.hdr-live{display:flex;align-items:center;gap:6px;margin-right:4px}
.live-dot{width:8px;height:8px;display:inline-block;border-radius:50%;flex-shrink:0}
.live-dot.on{background:#3fb950}.live-dot.off{background:#f85149}
.live-url{font-family:var(--mono);font-size:.75rem;padding:2px 8px;width:180px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rs);color:var(--t1)}
.live-url:focus{border-color:var(--acc);outline:none}
.live-latency{font-size:.72rem;color:var(--t3);min-width:32px}

/* Sidebar */
.sidebar{width:var(--side);min-width:var(--side);display:flex;flex-direction:column;background:var(--bg1);border-right:1px solid var(--brd);overflow:hidden}
.sb-search{position:relative;padding:8px;border-bottom:1px solid var(--brd-l)}
.sb-input{width:100%;padding:6px 28px 6px 10px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rs);color:var(--t1);font-size:.85rem;font-family:var(--sans);outline:none}
.sb-input:focus{border-color:var(--acc)}.sb-input::placeholder{color:var(--t3)}
.sb-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);font-size:1.2rem;cursor:pointer;line-height:1}
.mod-filter{padding:6px 8px;border-bottom:1px solid var(--brd-l);max-height:120px;overflow-y:auto;font-size:.8rem}
.mf-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.mf-title{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t3)}
.mf-acts{display:flex;gap:6px}
.mf-btn{background:none;border:none;font-size:.7rem;color:var(--link);cursor:pointer}
.mf-btn:hover{text-decoration:underline}
.mf-label{display:flex;align-items:center;gap:4px;padding:2px 0;color:var(--t2);cursor:pointer}
.mf-label:hover{color:var(--t1)}.mf-label input{accent-color:var(--acc)}
.sb-list{flex:1;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:6px;padding:4px 10px;font-size:.82rem;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .1s}
.sb-item:hover{background:var(--bg-h)}.sb-item.active{background:var(--bg-a)}
.sb-icon{flex-shrink:0;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;border-radius:3px;font-size:.7rem;font-weight:700;font-family:var(--mono)}
.sb-icon-c{background:#1f6feb22;color:#58a6ff}.sb-icon-e{background:#3fb95022;color:#3fb950}
.sb-icon-g{background:#d2992222;color:#d29922}.sb-icon-f{background:#a371f722;color:#a371f7}
.sb-icon-pb{background:#9333ea22;color:#9333ea}
.sb-name{overflow:hidden;text-overflow:ellipsis}
.sb-mod{margin-left:auto;flex-shrink:0;font-size:.7rem;color:var(--t3)}
.sb-ghdr{padding:6px 10px 3px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);position:sticky;top:0;background:var(--bg1);z-index:1}

/* Mobile toggle */
.sb-toggle{display:none;position:fixed;bottom:16px;left:16px;z-index:200;width:44px;height:44px;background:var(--acc);color:#fff;border:none;border-radius:50%;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.4);align-items:center;justify-content:center}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--brd);background:var(--bg1);flex-shrink:0}
.tab{padding:8px 16px;background:none;border:none;border-bottom:2px solid transparent;color:var(--t2);font-size:.85rem;font-weight:500;cursor:pointer;transition:color .15s,border-color .15s}
.tab:hover{color:var(--t1)}.tab.active{color:var(--acc);border-bottom-color:var(--acc)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.content{flex:1;overflow-y:auto;padding:16px 20px}
.empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--t3);font-size:.95rem}

/* Class detail */
.cls-hdr{margin-bottom:16px}
.cls-name{font-family:var(--mono);font-size:1.4rem;font-weight:700;margin-bottom:4px}
.cls-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:.82rem;color:var(--t2);margin-bottom:8px}
.cm-item{display:flex;align-items:center;gap:4px}.cm-label{color:var(--t3)}
.cls-chain{display:flex;flex-wrap:wrap;align-items:center;gap:4px;font-size:.82rem;margin-bottom:4px}
.cls-sep{color:var(--t3)}
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.badge{display:inline-block;padding:1px 6px;font-size:.7rem;font-family:var(--mono);background:var(--badge);color:var(--badge-t);border-radius:3px}
.badge-net{background:#1f6feb22;color:#58a6ff}
.badge-xmod{background:#da363322;color:#f85149;font-size:0.7em;vertical-align:middle}

/* Sections */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:20px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--brd-l)}
.sec-title{font-size:.85rem;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.sec-count{font-size:.75rem;color:var(--t3)}
.sec-toggle{background:none;border:none;font-size:.75rem;color:var(--link);cursor:pointer}.sec-toggle:hover{text-decoration:underline}

/* Tables */
.tw{overflow-x:auto}
table.ft{width:100%;border-collapse:collapse;font-size:.82rem;font-family:var(--mono)}
.ft th{text-align:left;padding:6px 10px;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);background:var(--bg2);border-bottom:1px solid var(--brd);cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;z-index:1}
.ft th:hover{color:var(--t1)}
.ft th.s-asc::after{content:' \25B2';font-size:.6rem}.ft th.s-desc::after{content:' \25BC';font-size:.6rem}
.ft td{padding:4px 10px;border-bottom:1px solid var(--brd-l);white-space:nowrap;max-width:300px;overflow:hidden;text-overflow:ellipsis}
.ft tr:hover td{background:var(--bg-h)}
.f-off{color:var(--t3)}.f-name{color:var(--t1)}.f-type{color:var(--acc)}.f-size{color:var(--t3)}.f-def{color:var(--t3);font-size:.75rem}
.pb-oneof{color:var(--t3);font-size:.85em;font-style:italic}
.pb-label{font-size:.85em;padding:1px 6px;border-radius:3px;background:var(--bg3)}
.pb-repeated{background:#2563eb22;color:#3b82f6}
.pb-required{background:#dc262622;color:#ef4444}

/* Globals */
.gl-mhdr{display:flex;align-items:center;gap:8px;padding:8px 0 4px;margin-top:12px;border-bottom:1px solid var(--brd-l);cursor:pointer}
.gl-mhdr:first-child{margin-top:0}
.gl-mname{font-family:var(--mono);font-size:.9rem;font-weight:600}
.gl-mcnt{font-size:.75rem;color:var(--t3)}
.gl-arrow{font-size:.7rem;color:var(--t3);transition:transform .15s}.gl-arrow.collapsed{transform:rotate(-90deg)}
.gl-badge{display:inline-block;padding:0 4px;font-size:.7rem;border-radius:3px}
.gl-badge-p{background:#1f6feb22;color:#58a6ff}.gl-badge-s{background:#3fb95022;color:#3fb950}

/* Tree */
.tree{font-family:var(--mono);font-size:.82rem}
.tn{padding-left:20px}
.tn-hdr{display:flex;align-items:center;gap:4px;padding:2px 4px;cursor:pointer;border-radius:var(--rs);transition:background .1s}
.tn-hdr:hover{background:var(--bg-h)}
.tn-tog{display:inline-flex;width:14px;height:14px;align-items:center;justify-content:center;font-size:.6rem;color:var(--t3);flex-shrink:0;transition:transform .15s}
.tn-tog.exp{transform:rotate(90deg)}.tn-tog.leaf{visibility:hidden}
.tn-name{color:var(--t1)}.tn-name:hover{color:var(--link)}
.tn-info{font-size:.72rem;color:var(--t3);margin-left:6px}
.tn-kids{display:none}.tn-kids.exp{display:block}

/* Links */
.cl{color:var(--link);cursor:pointer}.cl:hover{color:var(--link-h);text-decoration:underline}
.el{color:var(--ok);cursor:pointer}.el:hover{text-decoration:underline}

/* Live value column */
.live-val{cursor:pointer;transition:background .15s}.live-val:hover{background:var(--bg-h)}
.live-editing input{width:100%;font-family:var(--mono);background:var(--bg0);color:var(--t1);border:1px solid var(--acc);border-radius:var(--rs);padding:2px 6px}
.live-read-section{margin:20px 0 8px;padding:12px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r)}
.live-read-section label{font-size:.8rem;color:var(--t2);margin-right:6px}
.live-read-section input{font-family:var(--mono);font-size:.82rem;padding:4px 8px;background:var(--bg0);border:1px solid var(--brd);border-radius:var(--rs);color:var(--t1);width:240px}
.live-read-section input:focus{border-color:var(--acc);outline:none}
.live-read-section .btn{margin-left:8px}
.live-diff-flash{animation:diffFlash .6s ease-out}
@keyframes diffFlash{0%{background:rgba(232,93,117,.3)}100%{background:transparent}}
.live-diff-old{font-size:.75rem;color:var(--t3);text-decoration:line-through;margin-right:4px}

/* Rich live editors */
.live-bool{accent-color:var(--acc);cursor:pointer;width:15px;height:15px;vertical-align:middle}
.live-swatch{display:inline-block;width:14px;height:14px;border:1px solid var(--brd);border-radius:2px;vertical-align:middle;cursor:pointer;margin-right:4px}
.live-color-text{font-size:.78rem;color:var(--t2);vertical-align:middle}
.live-vec-comp,.live-num-drag{cursor:ew-resize;user-select:none;-webkit-user-select:none;padding:1px 4px;border-radius:var(--rs);font-family:var(--mono);font-size:.82rem;transition:background .1s}
.live-vec-comp:hover,.live-num-drag:hover{background:var(--bg-a)}
.live-vec-comp.dragging,.live-num-drag.dragging{background:var(--acc-d)}
.live-vec-label{font-size:.7rem;color:var(--t3);margin-right:1px;font-weight:600}
.live-ptr{color:var(--link);text-decoration:underline dotted;cursor:pointer;font-family:var(--mono);font-size:.82rem}
.live-ptr:hover{color:var(--link-h);text-decoration:underline solid}
.live-handle{color:var(--warn);font-family:var(--mono);font-size:.82rem;cursor:pointer;text-decoration:underline dotted}
.live-handle:hover{text-decoration:underline solid}
.live-color-popup{position:fixed;z-index:1000;background:var(--bg1);border:1px solid var(--brd);border-radius:var(--r);padding:8px;box-shadow:0 4px 12px rgba(0,0,0,.4);display:flex;flex-direction:column;gap:6px}
.live-color-popup input[type="color"]{width:48px;height:32px;border:none;padding:0;cursor:pointer;background:none}
.live-color-popup label{font-size:.75rem;color:var(--t2);display:flex;align-items:center;gap:6px}
.live-color-popup input[type="range"]{width:80px;accent-color:var(--acc)}

/* Entity browser — split-pane */
.ent-split{display:flex;height:100%;overflow:hidden}
.ent-list-pane{width:360px;min-width:280px;display:flex;flex-direction:column;border-right:1px solid var(--brd);overflow:hidden}
.ent-list-toolbar{display:flex;align-items:center;gap:6px;padding:8px;border-bottom:1px solid var(--brd-l);flex-shrink:0;flex-wrap:wrap}
.ent-list-toolbar input{font-family:var(--mono);font-size:.82rem;padding:4px 8px;background:var(--bg0);border:1px solid var(--brd);border-radius:var(--rs);color:var(--t1);flex:1;min-width:100px}
.ent-list-toolbar input:focus{border-color:var(--acc);outline:none}
.ent-list-toolbar .ent-count{font-size:.75rem;color:var(--t3);white-space:nowrap}
.ent-list-body{flex:1;overflow-y:auto}
.ent-row{display:grid;grid-template-columns:48px 1fr 150px;gap:0;font-size:.82rem;cursor:pointer;border-bottom:1px solid var(--brd-l);transition:background .1s}
.ent-row:hover{background:var(--bg-h)}
.ent-row.selected{background:var(--bg-a)}
.ent-row-cell{padding:3px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ent-row-idx{color:var(--t3);font-family:var(--mono);font-size:.78rem}
.ent-row-cls{color:var(--t1)}
.ent-row-addr{color:var(--t2);font-family:var(--mono);font-size:.75rem}
.ent-inspector-pane{flex:1;overflow-y:auto;padding:16px;min-width:0}
.ent-inspector-pane .empty{height:auto;padding:48px 0}
.ent-auto{font-size:.75rem;color:var(--t3)}
.ent-config-badge{font-size:.7rem;color:var(--t3);background:var(--bg0);border:1px solid var(--brd);border-radius:var(--rs);padding:2px 6px;cursor:help;white-space:nowrap;position:relative}
.ent-config-badge.probed{border-color:var(--acc);color:var(--acc)}
.ent-config-badge .ent-config-tip{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:var(--bg1);border:1px solid var(--brd);border-radius:var(--rs);padding:8px 10px;font-size:.72rem;color:var(--t2);white-space:pre;z-index:100;min-width:220px;line-height:1.6;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.ent-config-badge:hover .ent-config-tip{display:block}

/* Inspector tree */
.insp-hdr{margin-bottom:12px}
.insp-hdr-name{font-family:var(--mono);font-size:1.1rem;font-weight:700;margin-bottom:2px}
.insp-hdr-meta{font-size:.8rem;color:var(--t2);display:flex;gap:12px;flex-wrap:wrap}
.insp-section{margin-bottom:4px}
.insp-section-hdr{display:flex;align-items:center;gap:4px;padding:4px 8px;cursor:pointer;border-radius:var(--rs);font-size:.8rem;font-weight:600;color:var(--t2);transition:background .1s}
.insp-section-hdr:hover{background:var(--bg-h)}
.insp-section-arrow{font-size:.65rem;color:var(--t3);display:inline-block;transition:transform .15s;width:12px;text-align:center}
.insp-section-arrow.collapsed{transform:rotate(-90deg)}
.insp-section-body{padding-left:4px}
.insp-field{display:grid;grid-template-columns:1fr var(--val-col-w,220px);gap:0;font-size:.82rem;border-bottom:1px solid var(--brd-l);transition:background .1s}
.insp-field:hover{background:var(--bg-h)}
.insp-field-name{padding:3px 8px;font-family:var(--mono);color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.insp-field-name .f-off{margin-right:6px}
.insp-field-name .f-type{font-size:.75rem;margin-left:4px}
.insp-field-name .f-type a{color:var(--acc);text-decoration:none}
.insp-field-name .f-type a:hover{text-decoration:underline}
.insp-field-val{padding:3px 8px;font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.insp-field-val:hover{overflow:visible;white-space:normal;word-break:break-all}
.insp-col-resize{position:absolute;top:0;bottom:0;width:5px;cursor:col-resize;z-index:10;right:0}
.insp-col-resize:hover,.insp-col-resize.dragging{background:var(--acc);opacity:.5}
.insp-col-resize-wrap{position:relative}
.insp-field.hidden-by-filter{display:none}
.insp-section.hidden-by-filter{display:none}

/* Inspector toolbar */
.insp-toolbar{display:flex;gap:6px;align-items:center;padding:6px 0;margin-bottom:8px;flex-wrap:wrap}
.insp-toolbar input[type=text]{font-family:var(--mono);font-size:.78rem;padding:3px 8px;background:var(--bg0);border:1px solid var(--brd);border-radius:var(--rs);color:var(--t1);width:160px}
.insp-toolbar input[type=text]:focus{border-color:var(--acc);outline:none}
.insp-toolbar label{font-size:.78rem;color:var(--t2);display:flex;align-items:center;gap:3px;cursor:pointer}
.insp-toolbar .btn{font-size:.72rem;padding:2px 8px}
.insp-snapshot-badge{font-size:.7rem;color:var(--warn);margin-left:4px}

/* String value display */
.live-str{color:var(--ok);font-style:italic;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}
.live-str-ptr{font-size:.7rem;color:var(--t3);margin-left:4px}

/* Pointer drill-down */
.insp-drilldown{margin-left:16px;border-left:2px solid var(--brd);padding-left:8px;margin-top:2px}
.insp-drilldown-toggle{cursor:pointer;user-select:none;color:var(--acc);font-size:.78rem}
.insp-drilldown-toggle:hover{text-decoration:underline}
.insp-drilldown-field{font-size:.78rem;font-family:var(--mono);padding:1px 0;color:var(--t2)}
.insp-drilldown-field span.dd-name{color:var(--t1)}
.insp-drilldown-field span.dd-val{margin-left:8px}

/* Enum value display */

<script>
// ========================================================================
// Worker code (runs in Web Worker for parsing large JSON off main thread)
// ========================================================================
const WORKER_SRC = `
self.onmessage = function(e) {
  var msg = e.data;
  if (msg.type === 'parse') {
    try {
      self.postMessage({type:'status',text:'Parsing JSON...'});
      var data = JSON.parse(msg.text);
      // Strip vtable function bytes to save memory (~70% of file)
      var mods = data.modules || [];
      for (var i = 0; i < mods.length; i++) {
        var vts = mods[i].vtables || [];
        for (var j = 0; j < vts.length; j++) {
          var fns = vts[j].functions || [];
          for (var k = 0; k < fns.length; k++) { delete fns[k].bytes; }
        }
      }
      self.postMessage({type:'done', data: data});
    } catch(err) {
      self.postMessage({type:'error', message: err.message});
    }
  }
  if (msg.type === 'search') {
    var q = msg.query.toLowerCase().trim();
    if (!q) { self.postMessage({type:'searchResults',requestId:msg.requestId,results:[]}); return; }
    var entries = msg.entries;
    var results = [];
    for (var i = 0; i < entries.length; i++) {
      var name = entries[i][0].toLowerCase();
      if (name.includes(q)) {
        var score = 0;
        if (name === q) score = 1000;
        else if (name.startsWith(q)) score = 500 - name.length;
        else score = 200 - name.indexOf(q);
        var cat = entries[i][1];
        if (cat === 'c') score += 10;
        else if (cat === 'e') score += 5;
        results.push([i, score]);
      }
    }
    results.sort(function(a,b){ return b[1]-a[1]; });
    self.postMessage({type:'searchResults',requestId:msg.requestId,results:results.slice(0,200)});
  }
};
`;

// ========================================================================
// Globals
// ========================================================================
let D = null; // parsed data
let classMap, enumMap, allClasses, allEnums, childrenMap, rootClasses, moduleNames, moduleFilter;
var allProtoMessages = [], protoMap = new Map();
let activeTab = 'classes', activeItem = null;
let searchEntries = []; // [[name, category, module, context], ...]
let worker = null;
let searchReqId = 0;
let searchResolve = null;

// DOM
const $landing = document.getElementById('landing');
const $app = document.getElementById('app');
const $loadInd = document.getElementById('load-ind');
const $loadFill = document.getElementById('load-fill');
const $loadStatus = document.getElementById('load-status');
const $hdrInfo = document.getElementById('hdr-info');
const $content = document.getElementById('content');
const $sbInput = document.getElementById('sb-input');
const $sbClear = document.getElementById('sb-clear');
const $sbList = document.getElementById('sb-list');
const $modFilter = document.getElementById('mod-filter');
const $tabs = document.querySelectorAll('.tab');

// ========================================================================
// Utilities
// ========================================================================
function h(v, d) { if(v==null)return'\u2014'; var s=v.toString(16).toUpperCase(); return '0x'+s.padStart(d||3,'0'); }
function hs(s) { return s && !s.startsWith('0x') ? '0x'+s : (s||'\u2014'); }
function esc(s) { if(!s)return''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function el(t,c,x) { var e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; }
function fnum(n) { return n!=null?n.toLocaleString('en-US'):'0'; }

function extractType(t) {
  if(!t)return null;
  var n=t.replace(/[*&\s]+$/g,'').trim();
  var m=n.match(/^[A-Za-z_]\w*<\s*([A-Za-z_]\w*)\s*>$/);
  if(m) n=m[1];
  n=n.replace(/\[\d*\]$/,'').trim();
  return /^[A-Z]/.test(n)&&n.length>1 ? n : null;
}

function mkClassLink(name, mod) {
  var a = el('a','cl',name);
  a.href = '#class/'+encodeURIComponent(mod)+'/'+encodeURIComponent(name);
  return a;
}

function resolveClassMod(name, preferMod) {
  var e = classMap.get(name);
  if(!e) return null;
  if(preferMod && e.mods && e.mods.indexOf(preferMod)>=0) return preferMod;
  return e.m;
}

function nav(type, mod, name) {
  if(type==='class') location.hash='class/'+encodeURIComponent(mod)+'/'+encodeURIComponent(name);
  else if(type==='enum') location.hash='enum/'+encodeURIComponent(mod)+'/'+encodeURIComponent(name);
  else if(type==='globals') location.hash='globals';
  else if(type==='tree') location.hash='tree';
  else if(type==='protobuf') location.hash='protobuf/'+encodeURIComponent(mod)+'/'+encodeURIComponent(name);
}

let debounceTimer;
function debounce(fn, ms) { return function() { var a=arguments,self=this; clearTimeout(debounceTimer); debounceTimer=setTimeout(function(){fn.apply(self,a);},ms); }; }

// ========================================================================
// File Loading
// ========================================================================
function setupFileHandlers() {
  var dz = document.getElementById('drop-zone');
  var fi = document.getElementById('file-input');
  var fr = document.getElementById('file-reload');

  fi.addEventListener('change', function(e){ if(e.target.files[0]) loadFile(e.target.files[0]); });
  fr.addEventListener('change', function(e){ if(e.target.files[0]) loadFile(e.target.files[0]); });

  dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', function(){ dz.classList.remove('drag-over'); });
  dz.addEventListener('drop', function(e){
    e.preventDefault(); dz.classList.remove('drag-over');
    var f = e.dataTransfer.files[0];
    if(f && f.name.endsWith('.json')) loadFile(f);
  });
  dz.addEventListener('click', function(e){
    if(e.target.tagName!=='INPUT' && !e.target.closest('.btn')) fi.click();
  });
}

function loadFile(file) {
  $loadInd.classList.remove('hidden');
  var dzEl = document.querySelector('.drop-zone');
  if(dzEl) dzEl.classList.add('hidden');
  document.querySelector('.landing-divider').classList.add('hidden');
  document.querySelector('.landing-live').classList.add('hidden');
  $loadFill.style.width = '0%';
  $loadStatus.textContent = 'Reading file ('+Math.round(file.size/1024/1024)+' MB)...';

  var reader = new FileReader();
  reader.onprogress = function(e) {
    if(e.lengthComputable) {
      var pct = Math.round(e.loaded/e.total*50);
      $loadFill.style.width = pct+'%';
      $loadStatus.textContent = 'Reading file... '+Math.round(e.loaded/1024/1024)+'/'+Math.round(e.total/1024/1024)+' MB';
    }
  };
  reader.onload = function() {
    $loadFill.style.width = '50%';
    $loadStatus.textContent = 'Parsing JSON (this may take a moment)...';
    parseInWorker(reader.result);
  };
  reader.onerror = function() {
    $loadStatus.textContent = 'Error reading file: '+reader.error;
  };
  reader.readAsText(file);
}

function parseInWorker(text) {
  try {
    var blob = new Blob([WORKER_SRC], {type:'application/javascript'});
    worker = new Worker(URL.createObjectURL(blob));
    worker.onmessage = function(e) {
      var msg = e.data;
      if(msg.type==='status') { $loadStatus.textContent = msg.text; }
      else if(msg.type==='done') {
        $loadFill.style.width = '80%';
        $loadStatus.textContent = 'Building indices...';
        setTimeout(function(){ onDataReady(msg.data); }, 0);
      }
      else if(msg.type==='error') { $loadStatus.textContent = 'Parse error: '+msg.message; }
      else if(msg.type==='searchResults') {
        if(searchResolve && msg.requestId === searchReqId) {
          searchResolve(msg.results);
          searchResolve = null;
        }
      }
    };
    worker.postMessage({type:'parse', text:text});
  } catch(err) {
    // Fallback: parse on main thread
    $loadStatus.textContent = 'Parsing on main thread...';
    setTimeout(function(){
      try {
        var data = JSON.parse(text);
        // Strip bytes
        (data.modules||[]).forEach(function(m){
          (m.vtables||[]).forEach(function(vt){
            (vt.functions||[]).forEach(function(fn){ delete fn.bytes; });
          });
        });
        onDataReady(data);
      } catch(e) { $loadStatus.textContent = 'Parse error: '+e.message; }
    }, 0);
  }
}

// ========================================================================
// Data Indexing
// ========================================================================
function onDataReady(raw) {
  D = raw;
  classMap = new Map();
  enumMap = new Map();
  allClasses = [];
  allEnums = [];
  childrenMap = new Map();
  rootClasses = [];
  moduleNames = [];
  searchEntries = [];

  var mods = D.modules || [];
  for(var i=0; i<mods.length; i++) {
    var mod = mods[i], mn = mod.name;
    moduleNames.push(mn);

    var cls = mod.classes || [];
    for(var j=0; j<cls.length; j++) {
      var c = cls[j];
      if(!classMap.has(c.name)) classMap.set(c.name, {m:mn, o:c, mods:[mn]});
      else { var ex=classMap.get(c.name); if(ex.mods.indexOf(mn)<0) ex.mods.push(mn); }
      allClasses.push({n:c.name, m:mn});
      searchEntries.push([c.name, 'c', mn, null]);

      if(c.parent) {
        if(!childrenMap.has(c.parent)) childrenMap.set(c.parent, []);
        childrenMap.get(c.parent).push(c.name);
      } else {
        rootClasses.push(c.name);
      }

      // Index fields for search
      var flds = c.fields || [];
      for(var k=0; k<flds.length; k++) {
        searchEntries.push([flds[k].name, 'f', mn, c.name]);
      }
    }

    var enums = mod.enums || [];
    for(var j=0; j<enums.length; j++) {
      var e = enums[j];
      if(!enumMap.has(e.name)) enumMap.set(e.name, {m:mn, o:e});
      allEnums.push({n:e.name, m:mn});
      searchEntries.push([e.name, 'e', mn, null]);
      var vals = e.values || [];
      for(var k=0; k<vals.length; k++) {
        searchEntries.push([vals[k].name, 'v', mn, e.name]);
      }
    }
  }

  // Globals for search
  var globs = D.globals || {};
  for(var mn in globs) {
    var arr = globs[mn];
    for(var i=0; i<arr.length; i++) {
      searchEntries.push([arr[i].class, 'g', mn, null]);
    }
  }

  // Protobuf messages for search
  allProtoMessages = [];
  protoMap = new Map();
  var pbm = D.protobuf_messages || {};
  for(var mn in pbm) {
    var files = (pbm[mn].files||[]);
    for(var fi=0; fi<files.length; fi++) {
      var pf = files[fi];
      var msgs = pf.messages||[];
      for(var mi=0; mi<msgs.length; mi++) {
        var msg = msgs[mi];
        protoMap.set(msg.name, {m:mn, f:pf.name, o:msg});
        allProtoMessages.push({n:msg.name, m:mn});
        searchEntries.push([msg.name, 'pb', mn, pf.name]);
      }
    }
  }

  moduleNames.sort();
  rootClasses.sort();
  moduleFilter = new Set(moduleNames);

  $loadFill.style.width = '100%';
  $loadStatus.textContent = 'Done! '+fnum(allClasses.length)+' classes, '+fnum(allEnums.length)+' enums loaded.';

  // Show app
  $landing.classList.add('hidden');
  $app.classList.remove('hidden');

  $hdrInfo.textContent = fnum(D.total_classes||allClasses.length)+' classes \u00B7 '+fnum(D.total_fields||0)+' fields \u00B7 '+fnum(D.total_enums||allEnums.length)+' enums';

  buildModFilter();
  updateSBList();
  setupSearch();

  if(location.hash) handleHash();
  else showEmpty();
}

// ========================================================================
// Module Filter
// ========================================================================
function buildModFilter() {
  $modFilter.innerHTML = '';
  var hdr = el('div','mf-hdr');
  hdr.appendChild(el('span','mf-title','Modules ('+moduleNames.length+')'));
  var acts = el('div','mf-acts');
  var btnAll = el('button','mf-btn','All');
  var btnNone = el('button','mf-btn','None');
  btnAll.onclick = function(){ moduleFilter=new Set(moduleNames); updateChecks(true); updateSBList(); };
  btnNone.onclick = function(){ moduleFilter=new Set(); updateChecks(false); updateSBList(); };
  acts.appendChild(btnAll); acts.appendChild(btnNone);
  hdr.appendChild(acts); $modFilter.appendChild(hdr);

  var cbs = [];
  for(var i=0; i<moduleNames.length; i++) {
    (function(mn){
      var lbl = el('label','mf-label');
      var cb = document.createElement('input'); cb.type='checkbox'; cb.checked=true;
      cb.addEventListener('change', function(){ if(cb.checked) moduleFilter.add(mn); else moduleFilter.delete(mn); updateSBList(); });
      lbl.appendChild(cb); lbl.appendChild(document.createTextNode(' '+mn));
      $modFilter.appendChild(lbl);
      cbs.push(cb);
    })(moduleNames[i]);
  }

  function updateChecks(val){ cbs.forEach(function(c){c.checked=val;}); }
}

// ========================================================================
// Sidebar List
// ========================================================================
function updateSBList() {
  // Don't update if search is active
  if($sbInput.value.trim()) return;

  $sbList.innerHTML = '';
  var items;
  if(activeTab==='classes'||activeTab==='tree') {
    items = allClasses.filter(function(c){return moduleFilter.has(c.m);}).sort(function(a,b){return a.n.localeCompare(b.n);});
    renderSBItems(items, 'c');
  } else if(activeTab==='enums') {
    items = allEnums.filter(function(e){return moduleFilter.has(e.m);}).sort(function(a,b){return a.n.localeCompare(b.n);});
    renderSBItems(items, 'e');
  } else if(activeTab==='globals') {
    items = [];
    var globs = D.globals||{};
    for(var mn in globs) {
      if(!moduleFilter.has(mn)) continue;
      globs[mn].forEach(function(g){ items.push({n:g.class,m:mn}); });
    }
    items.sort(function(a,b){return a.n.localeCompare(b.n);});
    renderSBItems(items, 'g');
  } else if(activeTab==='protobuf') {
    items = allProtoMessages.filter(function(p){return moduleFilter.has(p.m);}).sort(function(a,b){return a.n.localeCompare(b.n);});
    renderSBItems(items, 'pb');
  }
}

function renderSBItems(items, cat) {
  // Use document fragment for performance
  var frag = document.createDocumentFragment();
  // Limit to 5000 rendered items for huge lists; user can search for the rest
  var limit = Math.min(items.length, 5000);
  var countNote = '';
  if(items.length > limit) countNote = ' (showing '+fnum(limit)+' of '+fnum(items.length)+')';

  var hdr = el('div','sb-ghdr', catLabel(cat)+' ('+fnum(items.length)+')'+countNote);
  frag.appendChild(hdr);

  for(var i=0; i<limit; i++) {
    var item = items[i];
    var row = el('div','sb-item');
    if(activeItem && activeItem.name===item.n && activeItem.module===item.m) row.classList.add('active');

    var icon = el('span','sb-icon '+catIconClass(cat), catIcon(cat));
    row.appendChild(icon);
    row.appendChild(el('span','sb-name',item.n));
    row.appendChild(el('span','sb-mod',item.m.replace('.dll','')));

    (function(it, c){
      row.onclick = function(){
        document.getElementById('sidebar').classList.remove('open');
        if(c==='pb') nav('protobuf', it.m, it.n);
        else if(c==='g') { var ce=classMap.get(it.n); if(ce) nav('class', it.m, it.n); else nav('global', it.m, it.n); }
        else nav(c==='e'?'enum':'class', it.m, it.n);
      };
    })(item, cat);

    frag.appendChild(row);
  }
  $sbList.appendChild(frag);
}

function catLabel(c){return{c:'Classes',e:'Enums',g:'Globals',f:'Fields',v:'Enum Values',pb:'Protobuf'}[c]||c;}
function catIcon(c){return{c:'C',e:'E',g:'G',f:'F',v:'V',pb:'PB'}[c]||'?';}
function catIconClass(c){return{c:'sb-icon-c',e:'sb-icon-e',g:'sb-icon-g',f:'sb-icon-f',v:'sb-icon-f',pb:'sb-icon-pb'}[c]||'';}

// ========================================================================
// Search
// ========================================================================
function setupSearch() {
  var doSearch = debounce(function(q){
    if(!q.trim()) {
      $sbClear.classList.add('hidden');
      updateSBList();
      return;
    }
    $sbClear.classList.remove('hidden');
    runSearch(q).then(function(results){ renderSearchResults(results); });
  }, 150);

  $sbInput.oninput = function(){ doSearch($sbInput.value); };
  $sbClear.onclick = function(){ $sbInput.value=''; $sbClear.classList.add('hidden'); updateSBList(); };
}

function runSearch(query) {
  // Try worker search first
  if(worker) {
    return new Promise(function(resolve){
      searchReqId++;
      searchResolve = resolve;
      // Send compact entries to worker
      worker.postMessage({type:'search', query:query, entries:searchEntries, requestId:searchReqId});
      setTimeout(function(){ if(searchResolve===resolve){searchResolve=null;resolve([]);} }, 3000);
    });
  }
  // Fallback: sync search
  return Promise.resolve(syncSearch(query));
}

function syncSearch(query) {
  var q = query.toLowerCase().trim();
  if(!q) return [];
  var results = [];
  for(var i=0; i<searchEntries.length; i++) {
    var name = searchEntries[i][0].toLowerCase();
    if(name.includes(q)) {
      var score = 0;
      if(name===q) score=1000;
      else if(name.startsWith(q)) score=500-name.length;
      else score=200-name.indexOf(q);
      var cat = searchEntries[i][1];
      if(cat==='c') score+=10; else if(cat==='e') score+=5;
      results.push([i, score]);
    }
  }
  results.sort(function(a,b){return b[1]-a[1];});
  return results.slice(0,200);
}

function renderSearchResults(results) {
  $sbList.innerHTML = '';
  if(!results.length) { $sbList.appendChild(el('div','empty','No results')); return; }

  // Group by category
  var groups = {};
  for(var i=0; i<results.length; i++) {
    var idx = results[i][0];
    var e = searchEntries[idx];
    var cat = e[1];
    if(!groups[cat]) groups[cat]=[];
    groups[cat].push(e);
  }

  var order = ['c','e','f','v','g','pb'];
  var frag = document.createDocumentFragment();
  for(var oi=0; oi<order.length; oi++) {
    var cat = order[oi];
    var items = groups[cat];
    if(!items || !items.length) continue;

    frag.appendChild(el('div','sb-ghdr',catLabel(cat)+' ('+items.length+')'));

    for(var i=0; i<items.length; i++) {
      var e = items[i]; // [name, cat, module, context]
      var row = el('div','sb-item');
      row.appendChild(el('span','sb-icon '+catIconClass(cat),catIcon(cat)));
      row.appendChild(el('span','sb-name',e[0]));
      row.appendChild(el('span','sb-mod', e[3]||e[2].replace('.dll','')));

      (function(entry, c){
        row.onclick = function(){
          document.getElementById('sidebar').classList.remove('open');
          if(c==='c'||c==='g') nav('class',entry[2],entry[0]);
          else if(c==='f') nav('class',entry[2],entry[3]);
          else if(c==='e') nav('enum',entry[2],entry[0]);
          else if(c==='v') nav('enum',entry[2],entry[3]);
          else if(c==='pb') { setTab('protobuf'); activeItem={type:'pb',module:entry[2],name:entry[0]}; renderContent(); location.hash='protobuf/'+encodeURIComponent(entry[2])+'/'+encodeURIComponent(entry[0]); }
        };
      })(e, cat);

      frag.appendChild(row);
    }
  }
  $sbList.appendChild(frag);
}

// ========================================================================
// Routing
// ========================================================================
function handleHash() {
  var hash = decodeURIComponent(location.hash.slice(1));
  if(!hash || !D) return;
  var p = hash.split('/');
  if(p[0]==='class' && p.length>=3) {
    setTab('classes');
    activeItem = {type:'class', module:p[1], name:p.slice(2).join('/')};
    renderContent();
    highlightSB();
  } else if(p[0]==='enum' && p.length>=3) {
    setTab('enums');
    activeItem = {type:'enum', module:p[1], name:p.slice(2).join('/')};
    renderContent();
    highlightSB();
  } else if(p[0]==='global' && p.length>=3) {
    setTab('globals');
    activeItem = {type:'global', module:p[1], name:p.slice(2).join('/')};
    renderContent();
    highlightSB();
  } else if(p[0]==='globals') {
    setTab('globals'); activeItem=null; renderContent();
  } else if(p[0]==='tree') {
    setTab('tree'); activeItem=null; renderContent();
  } else if(p[0]==='protobuf' && p.length>=3) {
    setTab('protobuf');
    activeItem = {type:'pb', module:p[1], name:p.slice(2).join('/')};
    renderContent();
    highlightSB();
  } else if(p[0]==='protobuf') {
    setTab('protobuf'); activeItem=null; renderContent();
  } else if(p[0]==='entities') {
    setTab('entities'); activeItem=null; renderContent();
  }
}
window.addEventListener('hashchange', handleHash);

function highlightSB() {
  var items = $sbList.querySelectorAll('.sb-item');
  items.forEach(function(el){ el.classList.remove('active'); });
  // Not critical for UX, skip expensive lookup
}

// ========================================================================
// Tabs
// ========================================================================
$tabs.forEach(function(tab){
  tab.addEventListener('click', function(){
    var t = tab.dataset.tab;
    setTab(t);
    if(t!=='entities') { stopEntityAutoRefresh(); if(typeof stopEntityInspector==='function') stopEntityInspector(); }
    if(t==='globals') nav('globals');
    else if(t==='tree') nav('tree');
    else if(t==='entities') { location.hash='entities'; activeItem=null; renderContent(); }
    else if(t==='protobuf') { location.hash='protobuf'; activeItem=null; renderContent(); }
    else { activeItem=null; updateSBList(); renderContent(); }
  });
});

function setTab(t) {
  activeTab = t;
  $tabs.forEach(function(tab){ tab.classList.toggle('active', tab.dataset.tab===t); });
  stopLiveRefresh();
  updateSBList();
}

// ========================================================================
// Content Rendering
// ========================================================================
function renderContent() {
  if(!D) return;
  $content.innerHTML = '';
  // Restore default content styles (entities tab overrides them)
  $content.style.padding = '';
  $content.style.overflow = '';

  if(activeTab==='entities') { renderEntities(); return; }
  if(activeTab==='globals') {
    if(activeItem && activeItem.type==='global') { renderGlobalDetail(activeItem.name, activeItem.module); return; }
    renderGlobals(); return;
  }
  if(activeTab==='tree') { renderTree(); return; }
  if(activeTab==='protobuf') { if(activeItem && activeItem.type==='pb') { var pb=protoMap.get(activeItem.name); if(pb) renderProtoMessage(pb.o, pb.m, pb.f); else $content.innerHTML='<div class="empty">Message "'+esc(activeItem.name)+'" not found</div>'; } else { renderProtobuf(); } return; }
  if(!activeItem) { showEmpty(); return; }

  if(activeItem.type==='class') {
    var e = classMap.get(activeItem.name);
    if(e) renderClass(e.o, activeItem.module||e.m);
    else $content.innerHTML='<div class="empty">Class "'+esc(activeItem.name)+'" not found</div>';
  } else if(activeItem.type==='enum') {
    var e = enumMap.get(activeItem.name);
    if(e) renderEnum(e.o, e.m);
    else $content.innerHTML='<div class="empty">Enum "'+esc(activeItem.name)+'" not found</div>';
  }
}

function showEmpty() {
  $content.innerHTML='<div class="empty"><p>Select a class, enum, or view from the sidebar</p></div>';
}

// ========================================================================
// Class View
// ========================================================================
var liveReadAddr = ''; // persisted address for live read
var liveReadSubId = null;
var liveReadTimer = null;

function renderClass(cls, mod) {
  $content.innerHTML = '';
  var hdr = el('div','cls-hdr');
  hdr.appendChild(el('h2','cls-name',cls.name));

  var meta = el('div','cls-meta');
  meta.appendChild(metaI('Module',mod));
  meta.appendChild(metaI('Size',cls.size+' bytes ('+h(cls.size)+')'));
  if(cls.fields) meta.appendChild(metaI('Fields',String(cls.fields.length)));
  hdr.appendChild(meta);

  // Inheritance
  if(cls.inheritance && cls.inheritance.length>1) {
    var chain = el('div','cls-chain');
    chain.appendChild(el('span','cm-label','Inherits: '));
    for(var i=0;i<cls.inheritance.length;i++) {
      if(i>0) chain.appendChild(el('span','cls-sep',' \u203A '));
      var cn = cls.inheritance[i], cnMod = resolveClassMod(cn, mod);
      if(cnMod && cn!==cls.name) chain.appendChild(mkClassLink(cn, cnMod));
      else chain.appendChild(el('span', i===0?'f-type':'', cn));
    }
    hdr.appendChild(chain);
  } else if(cls.parent) {
    var chain = el('div','cls-chain');
    chain.appendChild(el('span','cm-label','Parent: '));
    var peMod = resolveClassMod(cls.parent, mod);
    if(peMod) chain.appendChild(mkClassLink(cls.parent, peMod));
    else chain.appendChild(el('span','',cls.parent));
    hdr.appendChild(chain);
  }

  // Badges
  if(cls.metadata && cls.metadata.length) {
    var badges = el('div','badges');
    cls.metadata.forEach(function(m){
      var b=el('span','badge',m);
      if(m.includes('Network')) b.classList.add('badge-net');
      badges.appendChild(b);
    });
    hdr.appendChild(badges);
  }
  $content.appendChild(hdr);

  // Live Read section (when connected)
  if(liveClient.connected) {
    var lrs = el('div','live-read-section');
    var lrsLabel = el('label','','Address');
    lrsLabel.style.fontWeight='600';
    lrs.appendChild(lrsLabel);
    lrs.appendChild(document.createTextNode(' '));
    var addrInput = document.createElement('input');
    addrInput.type='text'; addrInput.placeholder='0x7FF012345678'; addrInput.value=liveReadAddr;
    addrInput.id='live-read-addr';
    lrs.appendChild(addrInput);
    var watchBtn = el('button','btn btn--s', liveReadAddr ? 'Stop' : 'Watch');
    if(liveReadAddr) watchBtn.style.background='var(--brd)';
    watchBtn.onclick = function(){
      if(liveReadAddr) { stopLiveRefresh(); liveReadAddr=''; renderContent(); }
      else { liveReadAddr = document.getElementById('live-read-addr').value.trim(); if(liveReadAddr) startLiveClassRead(cls, mod); }
    };
    lrs.appendChild(watchBtn);
    $content.appendChild(lrs);
  }

  // Components
  if(cls.components && cls.components.length) {
    var sec = mkSec('Components', cls.components.length);
    var tw = el('div','tw'), t = el('table','ft'), th = el('thead'), hr = el('tr');
    ['Offset','Name'].forEach(function(c){hr.appendChild(el('th','',c));});
    th.appendChild(hr); t.appendChild(th);
    var tb = el('tbody');
    cls.components.forEach(function(comp){
      var tr=el('tr');
      tr.appendChild(el('td','f-off',h(comp.offset)));
      var td=el('td','f-name'), compMod=resolveClassMod(comp.name,mod);
      if(compMod) td.appendChild(mkClassLink(comp.name,compMod)); else td.textContent=comp.name;
      tr.appendChild(td); tb.appendChild(tr);
    });
    t.appendChild(tb); tw.appendChild(t); sec.appendChild(tw); $content.appendChild(sec);
  }

  // Fields
  var own = cls.fields||[];
  var flat = flatFields(cls.name);
  if(own.length || flat.length) {
    var sec = el('div');
    var sh = el('div','sec-hdr');
    var title = el('span','sec-title','Fields');
    var cnt = el('span','sec-count');
    sh.appendChild(title); sh.appendChild(cnt);
    var showFlat = false;
    if(flat.length > own.length) {
      var tog = el('button','sec-toggle');
      tog.onclick = function(){ showFlat=!showFlat; renderFields(); };
      sh.appendChild(tog);
    }
    sec.appendChild(sh);

    function renderFields() {
      var f = showFlat ? flat : own.map(function(ff){return Object.assign({},ff,{definedIn:cls.name});});
      cnt.textContent = f.length+' fields';
      if(tog) tog.textContent = showFlat?'Show own only':'Show flattened';
      var old = sec.querySelector('.tw'); if(old) old.remove();
      sec.appendChild(mkFieldTable(f, showFlat, mod, liveClient.connected));
    }
    var tog = flat.length>own.length ? sh.querySelector('.sec-toggle') : null;
    renderFields();
    $content.appendChild(sec);
  }

  // Static fields
  if(cls.static_fields && cls.static_fields.length) {
    var sec = mkSec('Static Fields', cls.static_fields.length);
    sec.appendChild(mkFieldTable(cls.static_fields.map(function(f){return Object.assign({},f,{definedIn:cls.name});}), false, mod, liveClient.connected));
    $content.appendChild(sec);
  }

  // If we have a live address, start auto-refresh
  if(liveClient.connected && liveReadAddr) {
    startLiveClassRead(cls, mod);
  }
}

async function startLiveClassRead(cls, mod) {
  stopLiveRefresh();
  try {
    var result = await liveClient.subscribe(liveReadAddr, mod, cls.name, 100, function(changes) {
      // Diff callback — update DOM cells scoped to this subscription
      var cells = $content.querySelectorAll('td[data-live-field]');
      cells.forEach(function(td) {
        var fname = td.dataset.liveField;
        if (changes[fname] !== undefined) {
          var change = changes[fname];
          var newVal = change.new !== undefined ? change.new : change;
          var oldVal = change.old;
          if (!td.classList.contains('editing')) {
            renderLiveValue(td, td.dataset.liveType, newVal);
            // Re-attach editors after render since innerHTML is cleared
            if (typeof activeItem !== 'undefined' && activeItem) {
              attachLiveEditor(td, fname, td.dataset.liveType, mod, activeItem.name);
            }
          }
          td.classList.remove('live-diff-flash');
          void td.offsetWidth;
          td.classList.add('live-diff-flash');
          if (oldVal !== undefined) {
            var oldDisplay = (typeof oldVal === 'object' && oldVal !== null)
              ? JSON.stringify(oldVal) : String(oldVal);
            td.title = 'Was: ' + oldDisplay;
          }
        }
      });
    });
    if (result && result.sub_id !== undefined) {
      liveReadSubId = result.sub_id;
      conLog('info', 'Subscribed to ' + cls.name + ' (sub_id: ' + result.sub_id + ')');
      refreshLiveClassFields(cls, mod);
      return;
    }
  } catch(e) { /* subscription not supported, fall back to polling */ }
  refreshLiveClassFields(cls, mod);
  liveReadTimer = setInterval(function(){ refreshLiveClassFields(cls, mod); }, 500);
}

async function refreshLiveClassFields(cls, mod) {
  if(!liveClient.connected || !liveReadAddr) { stopLiveRefresh(); return; }
  try {
    var data = await liveClient.send('mem.read_object', {
      addr: liveReadAddr, module: mod, 'class': cls.name
    });
    // Update value cells in-place with rich renderers
    var cells = $content.querySelectorAll('td[data-live-field]');
    cells.forEach(function(td){
      var fname = td.dataset.liveField;
      if(data[fname] !== undefined) {
        if (!td.classList.contains('editing')) {
          renderLiveValue(td, td.dataset.liveType, data[fname]);
          attachLiveEditor(td, fname, td.dataset.liveType, mod, cls.name);
        }
      }
    });
  } catch(e) { /* silently skip on error */ }
}

// --- Rich LIVE editor helpers ---
function liveEditorType(fieldType) {
  if (!fieldType) return 'text';
  var t = fieldType.replace(/\s/g,'');
  if (t === 'bool') return 'bool';
  if (t === 'Color') return 'color';
  if (/^(Vector[24]?D?|QAngle|Vector4D|Quaternion)$/i.test(t)) return 'vector';
  if (/^CHandle</.test(t)) return 'handle';
  if (/^(CUtlString|CUtlSymbolLarge)$/.test(t)) return 'pointer';
  if (/^float(32|64)?$/.test(t)) return 'float';
  if (/^(u?int(8|16|32|64)|char|short|long|bool)$/.test(t)) return 'int';
  // Enum types — show dropdown picker
  if (enumMap && enumMap.has(t)) return 'enum';
  // Struct/class types — show type badge
  if (classMap && classMap.has(t)) return 'struct';
  return 'text';
}

// --- Rich type sub-renderers ---

function renderEnumValue(td, val) {
  var badge = document.createElement('span');
  badge.className = 'live-enum';
  if (val.name) {
    badge.textContent = val.name;
    var dim = document.createElement('span');
    dim.className = 'live-enum-raw';
    dim.textContent = ' (' + val.v + ')';
    td.appendChild(badge);
    td.appendChild(dim);
  } else {
    badge.textContent = String(val.v);
    badge.title = val.enum || '';
    td.appendChild(badge);
  }
  if (val.enum) {
    var typeBadge = document.createElement('span');
    typeBadge.className = 'badge live-enum-type';
    typeBadge.textContent = val.enum;
    td.appendChild(typeBadge);
  }
}

function renderStructValue(td, val) {
  var toggle = document.createElement('span');
  toggle.className = 'insp-drilldown-toggle live-struct-toggle';
  toggle.textContent = '\u25B6 {' + val.class + '}';
  toggle.title = val.module ? val.module + '::' + val.class : val.class;
  td.appendChild(toggle);
  toggle.addEventListener('click', function() {
    var existing = toggle.parentElement.querySelector('.insp-drilldown');
    if (existing) { existing.remove(); toggle.textContent = '\u25B6 {' + val.class + '}'; return; }
    toggle.textContent = '\u25BC {' + val.class + '}';
    var container = document.createElement('div');
    container.className = 'insp-drilldown';
    var fields = val.fields || {};
    Object.keys(fields).forEach(function(fname) {
      var row = document.createElement('div');
      row.className = 'insp-drilldown-field';
      var nameSpan = document.createElement('span');
      nameSpan.className = 'dd-name';
      nameSpan.textContent = fname;
      row.appendChild(nameSpan);
      var valSpan = document.createElement('span');
      valSpan.className = 'dd-val';
      renderLiveValue(valSpan, '', fields[fname]);
      row.appendChild(valSpan);
      container.appendChild(row);
    });
    toggle.parentElement.appendChild(container);
  });
}

function renderVectorValue(td, val, label) {
  var header = document.createElement('span');
  header.className = 'live-vec-header';
  var countText = val.count !== undefined ? val.count : (val.items ? val.items.length : 0);
  header.textContent = (label || '') + '[' + countText + (val.truncated ? '+' : '') + ' items]';
  if (val.type) header.title = 'Element type: ' + val.type;
  td.appendChild(header);

  if (!val.items || val.items.length === 0) return;

  var toggle = document.createElement('span');
  toggle.className = 'insp-drilldown-toggle';
  toggle.textContent = ' \u25B6';
  toggle.style.marginLeft = '4px';
  td.appendChild(toggle);
  toggle.addEventListener('click', function() {
    var existing = toggle.parentElement.querySelector('.insp-drilldown');
    if (existing) { existing.remove(); toggle.textContent = ' \u25B6'; return; }
    toggle.textContent = ' \u25BC';
    var container = document.createElement('div');
    container.className = 'insp-drilldown';
    val.items.forEach(function(item, i) {
      var row = document.createElement('div');
      row.className = 'insp-drilldown-field';
      var idxSpan = document.createElement('span');
      idxSpan.className = 'dd-name';
      idxSpan.textContent = '[' + i + ']';
      row.appendChild(idxSpan);
      var valSpan = document.createElement('span');
      valSpan.className = 'dd-val';
      renderLiveValue(valSpan, val.type || '', item);
      row.appendChild(valSpan);
      container.appendChild(row);
    });
    if (val.truncated) {
      var more = document.createElement('div');
      more.className = 'insp-drilldown-field';
      more.style.color = 'var(--t3)';
      more.textContent = '... (' + val.count + ' total, showing first ' + val.items.length + ')';
      container.appendChild(more);
    }
    toggle.parentElement.appendChild(container);
  });
}

function renderArrayValue(td, val) {
  if (val.items && val.items.length <= 4) {
    // Small arrays: show inline
    var labels = ['x','y','z','w'];
    val.items.forEach(function(item, i) {
      if (i > 0) td.appendChild(document.createTextNode(' '));
      var lbl = document.createElement('span');
      lbl.className = 'live-vec-label';
      lbl.textContent = val.items.length <= 4 ? (labels[i] || String(i)) : String(i);
      td.appendChild(lbl);
      var sp = document.createElement('span');
      sp.className = 'live-vec-comp';
      sp.textContent = typeof item === 'number' ? (Number.isInteger(item) ? String(item) : item.toFixed(2)) : String(item);
      td.appendChild(sp);
    });
    var typeBadge = document.createElement('span');
    typeBadge.className = 'badge';
    typeBadge.style.marginLeft = '6px';
    typeBadge.textContent = (val.type || '') + '[' + val.count + ']';
    td.appendChild(typeBadge);

  // Large arrays: collapsible like vector
  renderVectorValue(td, val, (val.type || '') + ' ');

function renderStringValue(td, val) {

    strSpan.className = 'live-str';
    strSpan.textContent = '"' + val.str + '"';
    strSpan.title = val.ptr ? 'Pointer: ' + val.ptr : '';
    td.appendChild(strSpan);
  }
  if (val.ptr) {
    var ptrSpan = document.createElement('span');
    ptrSpan.className = 'live-str-ptr';
    ptrSpan.textContent = val.ptr;
    td.appendChild(ptrSpan);
  }
  if (!val.str && !val.ptr) td.textContent = '\u2014';
}

function renderLiveValue(td, fieldType, value) {
  var edType = td.dataset ? (td.dataset.editorType || liveEditorType(fieldType)) : liveEditorType(fieldType);
  td.innerHTML = '';
  if (value === null || value === undefined) { td.textContent = '\u2014'; return; }

  // --- Rich typed objects from server (discriminator-based) ---
  if (value && typeof value === 'object' && value._t) {
    switch (value._t) {
      case 'enum':   renderEnumValue(td, value); return;
      case 'struct': renderStructValue(td, value); return;
      case 'vector': renderVectorValue(td, value); return;
      case 'array':  renderArrayValue(td, value); return;
      case 'ptr':    renderPointerValue(td, value); return;
      case 'handle': renderHandleValue(td, value); return;
      case 'string': renderStringValue(td, value); return;
    }
  }

  // --- Legacy string objects from server: { str, ptr, type } ---
  if (value && typeof value === 'object' && value.str !== undefined) {
    var strSpan = document.createElement('span');
    strSpan.className = 'live-str';
    strSpan.textContent = '"' + value.str + '"';
    strSpan.title = value.ptr ? 'Pointer: ' + value.ptr : '';
    td.appendChild(strSpan);
    if (value.ptr) {
      var ptrSpan = document.createElement('span');
      ptrSpan.className = 'live-str-ptr';
      ptrSpan.textContent = value.ptr;
      td.appendChild(ptrSpan);
    }
    return;
  }

  // --- Bare primitives ---
  if (edType === 'bool') {
    var cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'live-bool';
    cb.checked = !!value;
    cb.disabled = true;
    td.appendChild(cb);
    return;
  }
  if (edType === 'color' && Array.isArray(value)) {
    var sw = document.createElement('span');
    sw.className = 'live-swatch';
    var r = value[0]||0, g = value[1]||0, b = value[2]||0, a = value[3] !== undefined ? value[3] : 255;
    sw.style.background = 'rgba('+r+','+g+','+b+','+(a/255).toFixed(2)+')';
    td.appendChild(sw);
    var ct = document.createElement('span');
    ct.className = 'live-color-text';
    ct.textContent = r+', '+g+', '+b+', '+a;
    td.appendChild(ct);
    return;
  }
  if (edType === 'vector' && Array.isArray(value)) {
    var labels = ['x','y','z','w'];
    value.forEach(function(v, i) {
      if (i > 0) td.appendChild(document.createTextNode(' '));
      var lbl = document.createElement('span');
      lbl.className = 'live-vec-label'; lbl.textContent = labels[i] || String(i);
      td.appendChild(lbl);
      var sp = document.createElement('span');
      sp.className = 'live-vec-comp'; sp.dataset.compIdx = i;
      sp.textContent = typeof v === 'number' ? v.toFixed(2) : String(v);
      sp.title = 'Drag to scrub, double-click to edit';
      td.appendChild(sp);
    });
    return;
  }
  if (edType === 'float') {
    var sp = document.createElement('span');
    sp.className = 'live-num-drag';
    sp.textContent = typeof value === 'number' ? value.toFixed(4) : String(value);
    sp.title = 'Drag to scrub, double-click to edit';
    td.appendChild(sp);
    return;
  }
  if (edType === 'int') {
    var sp = document.createElement('span');
    sp.className = 'live-num-drag';
    sp.textContent = String(value);
    sp.title = 'Drag to scrub, double-click to edit';
    td.appendChild(sp);
    return;
  }
  if (edType === 'enum') {
    var enumName = fieldType ? fieldType.replace(/\s/g,'') : '';
    var enumEntry = enumMap ? enumMap.get(enumName) : null;
    var numVal = typeof value === 'number' ? value : parseInt(value, 10);
    var sp = document.createElement('span');
    sp.className = 'live-num-drag';
    // Try to resolve the enum name
    var resolvedName = null;
    if (enumEntry && enumEntry.o && enumEntry.o.items) {
      for (var ei = 0; ei < enumEntry.o.items.length; ei++) {
        if (enumEntry.o.items[ei].value === numVal) { resolvedName = enumEntry.o.items[ei].name; break; }
      }
    }
    sp.textContent = resolvedName ? resolvedName + ' (' + numVal + ')' : String(isNaN(numVal) ? value : numVal);
    sp.title = 'Double-click for enum picker';
    td.appendChild(sp);
    if (enumName) {
      var eb = document.createElement('span');
      eb.className = 'live-enum-badge';
      eb.textContent = enumName;
      td.appendChild(eb);
    }
    return;
  }
  if (edType === 'handle') {
    var raw = typeof value === 'number' ? value : parseInt(value, 10);
    var idx = raw & 0x7FFF, serial = (raw >>> 15) & 0x1FFFF;
    var badge = document.createElement('span');
    badge.className = 'live-handle';
    badge.textContent = 'ent:' + idx + ' seq:' + serial;
    badge.title = 'Click to follow entity. Raw: 0x' + (raw >>> 0).toString(16).toUpperCase();
    td.appendChild(badge);
    return;
  }
  if (edType === 'pointer') {
    var strVal = String(value);
    var link = document.createElement('span');
    link.className = 'live-ptr insp-drilldown-toggle';
    link.textContent = '\u25B6 ' + strVal;
    link.title = 'Click to drill down (string pointer)';
    link.dataset.drillAddr = strVal;
    link.dataset.drillType = fieldType || '';
    td.appendChild(link);
    return;
  }
  if (edType === 'struct') {
    var badge = document.createElement('span');
    badge.className = 'badge';
    badge.style.cursor = 'default';
    badge.textContent = fieldType;
    badge.title = 'Embedded struct';
    td.appendChild(badge);
    // Determine drill-down address: either from value or computed from entity base + offset
    var drillAddr = null;
    if (value && typeof value === 'string' && value.startsWith('0x')) {
      drillAddr = value;
    } else if (selectedEntity && selectedEntity.addr && td.dataset && td.dataset.fieldOffset) {
      // Compute address: entity base + field offset
      try {
        var base = BigInt(selectedEntity.addr);
        var off = BigInt(parseInt(td.dataset.fieldOffset, 10));
        drillAddr = '0x' + (base + off).toString(16).toUpperCase();
      } catch(e) { /* ignore */ }
    }
    if (drillAddr) {
      td.appendChild(document.createTextNode(' '));
      var addrSpan = document.createElement('span');
      addrSpan.className = 'insp-drilldown-toggle';
      addrSpan.textContent = '\u25B6 ' + drillAddr;
      addrSpan.title = 'Click to drill down';
      addrSpan.dataset.drillAddr = drillAddr;
      addrSpan.dataset.drillType = fieldType;
      td.appendChild(addrSpan);
    }
    return;
  }
  // fallback text
  var display = (typeof value === 'object' && value !== null) ? JSON.stringify(value) : String(value);
  td.textContent = display;
  td.title = display;
}

function attachLiveEditor(td, fieldName, fieldType, module, className) {
  var edType = td.dataset.editorType || liveEditorType(fieldType);

  // Read-only: handle follow
  if (edType === 'handle') {
    td.onclick = function() {
      var badge = td.querySelector('.live-handle');
      if (!badge) return;
      var raw = badge.title.match(/Raw:\s*0x([0-9a-fA-F]+)/);
      conLog('info', 'Handle click — entity index: ' + (parseInt(raw?raw[1]:'0',16) & 0x7FFF));
    };
    return;
  }

  // Read-only: pointer follow
  if (edType === 'pointer') {
    td.onclick = function() {
      var link = td.querySelector('.live-ptr');
      if (!link) return;
      var addr = link.textContent.trim();
      if (/^0x/i.test(addr)) {
        liveReadAddr = addr;
        var addrInput = document.getElementById('live-read-addr');
        if (addrInput) addrInput.value = addr;
        if (typeof activeItem !== 'undefined' && activeItem) {
          startLiveClassRead(activeItem, activeItem.module || '');
        }
        conLog('info', 'Followed pointer to ' + addr);
      }
    };
    return;
  }
}

var sortCol='offset', sortDir='asc';
function mkFieldTable(fields, showDef, preferMod, showLiveValues) {
  var tw=el('div','tw'), t=el('table','ft'), th=el('thead'), hr=el('tr');

function flatFields(name) {
  var e=classMap.get(name);
  if(!e) return [];
  if(e.o._flat) return e.o._flat;
  var fields=[], visited=new Set();
  function collect(n){
    if(visited.has(n))return; visited.add(n);
    var x=classMap.get(n); if(!x)return;
    (x.o.fields||[]).forEach(function(f){fields.push(Object.assign({},f,{definedIn:n}));});
    if(x.o.parent) collect(x.o.parent);
  }
  collect(name);
  fields.sort(function(a,b){return a.offset-b.offset;});
  e.o._flat = fields;
  return fields;
}

function mkTreeNode(name, depth) {
  var e=classMap.get(name); if(!e) return null;
  var kids=childrenMap.get(name)||[];
  var hasKids=kids.length>0;

  var node=el('div','tn');
  if(depth===0) node.style.paddingLeft='0';

  var hdr=el('div','tn-hdr');
  var tog=el('span','tn-tog','\u25B6');
  if(!hasKids) tog.classList.add('leaf');
  hdr.appendChild(tog);

  var a=el('a','tn-name',name);
  a.href='#class/'+encodeURIComponent(e.m)+'/'+encodeURIComponent(name);
  a.onclick=function(ev){ ev.preventDefault(); nav('class',e.m,name); };
  hdr.appendChild(a);

  var info=[];
  if(e.o.size) info.push(e.o.size+'B');
  if(hasKids) info.push(kids.length+' children');
  if(info.length) hdr.appendChild(el('span','tn-info','('+info.join(', ')+')'));

  node.appendChild(hdr);

  if(hasKids) {
    var cc=el('div','tn-kids');
    var rendered=false;
    tog.onclick=function(ev){
      ev.stopPropagation();
      var isExp=cc.classList.contains('exp');
      if(!isExp && !rendered) {
        kids.slice().sort().forEach(function(cn){ var n=mkTreeNode(cn,depth+1); if(n)cc.appendChild(n); });
        rendered=true;
      }
      cc.classList.toggle('exp'); tog.classList.toggle('exp');
    };
    hdr.ondblclick=function(ev){ ev.preventDefault(); tog.click(); };
    node.appendChild(cc);
  }
  return node;
}

// ========================================================================
// LiveClient — WebSocket Debug Client
// ========================================================================

class LiveClient {
    constructor() {
        this.ws = null;
        this.reqId = 0;
        this.pending = new Map();
        this.onStatusChange = null;
        this.onLatency = null;
        this._pingTimer = null;
        this._backoff = 1000;
        this._subscriptions = new Map();
        this._diffListeners = new Map();
    }
    connect(url) {
        return new Promise((resolve, reject) => {
            if (this.ws) this.disconnect();
            this.ws = new WebSocket(url);
            this.ws.onopen = () => {
                this._backoff = 1000;
                if (this.onStatusChange) this.onStatusChange(true);
                this._startPing();
                resolve();
            };
            this.ws.onerror = () => reject(new Error('WebSocket connection failed'));
            this.ws.onclose = () => {
                this._stopPing();
                this._subscriptions = new Map();
                if (this.onStatusChange) this.onStatusChange(false);
                this.pending.forEach(p => p.reject(new Error('disconnected')));
                this.pending.clear();
                this.ws = null;
            };
            this.ws.onmessage = (e) => {
                try {
                    var msg = JSON.parse(e.data);
                    if (msg.id !== undefined) {
                        var p = this.pending.get(msg.id);
                        if (p) {
                            this.pending.delete(msg.id);
                            if (msg.ok) p.resolve(msg.data);
                            else p.reject(new Error(msg.error || 'unknown error'));
                        }
                        return;
                    }
                    if (msg.cmd) this._handlePush(msg);
                } catch(err) {}
            };
        });
    }
    disconnect() {
        this._stopPing();
        this._subscriptions.clear();
        this._diffListeners.clear();
        if (this.ws) { this.ws.onclose = null; this.ws.close(); this.ws = null; }
        if (this.onStatusChange) this.onStatusChange(false);
    }
    send(cmd, args) {
        return new Promise((resolve, reject) => {
            if (!this.ws || this.ws.readyState !== 1) return reject(new Error('not connected'));
            var id = ++this.reqId;
            this.pending.set(id, { resolve, reject });
            this.ws.send(JSON.stringify({ id, cmd, args: args || {} }));
            setTimeout(() => {
                if (this.pending.has(id)) {
                    this.pending.delete(id);
                    reject(new Error('timeout'));
                }
            }, 5000);
        });
    }
    get connected() { return this.ws && this.ws.readyState === 1; }
    _startPing() {
        this._pingTimer = setInterval(async () => {
            if (!this.connected) return;
            var t0 = performance.now();
            try {
                await this.send('ping');
                if (this.onLatency) this.onLatency(Math.round(performance.now() - t0));
            } catch(e) {}
        }, 5000);
    }
    _stopPing() {
        if (this._pingTimer) { clearInterval(this._pingTimer); this._pingTimer = null; }
    }

    _handlePush(msg) {
        switch(msg.cmd) {
            case 'mem.diff':
                this._handleDiff(msg.data);
                break;
            case 'live.disconnected':
                conLog('error', 'Game disconnected — pipe broken');
                this.disconnect();
                break;
            default:
                conLog('push', '\u2190 push: ' + msg.cmd);
        }
    }

    _handleDiff(data) {
        if (!data || !data.changes) return;
        var subId = data.sub_id;

        // Notify any registered diff listeners (for multi-sub support)
        var listener = this._diffListeners && this._diffListeners.get(subId);
        if (listener) {
            listener(data.changes);
            return;
        }

        // Fallback: apply to DOM cells scoped by data-live-sub attribute
        // Only update cells belonging to this subscription (or unscoped cells if sub matches active)
        var cells = document.querySelectorAll('td[data-live-field]');
        cells.forEach(function(td) {
            // Skip cells from a different subscription
            var cellSub = td.dataset.liveSub;
            if (cellSub && parseInt(cellSub) !== subId) return;

            var fname = td.dataset.liveField;
            if (data.changes[fname] !== undefined) {
                var change = data.changes[fname];
                var newVal = change.new !== undefined ? change.new : change;
                var oldVal = change.old;
                if (!td.classList.contains('editing') && typeof renderLiveValue === 'function') {
                    renderLiveValue(td, td.dataset.liveType, newVal);
                } else {
                    var display = (typeof newVal === 'object' && newVal !== null)
                        ? JSON.stringify(newVal) : String(newVal);
                    td.textContent = display;
                }
                td.classList.remove('live-diff-flash');
                void td.offsetWidth;
                td.classList.add('live-diff-flash');
                if (oldVal !== undefined) {
                    var oldDisplay = (typeof oldVal === 'object' && oldVal !== null)
                        ? JSON.stringify(oldVal) : String(oldVal);
                    td.title = 'Was: ' + oldDisplay;
                }
            }
        });
    }

    async subscribe(addr, module, className, intervalMs, onDiff) {
        var result = await this.send('mem.subscribe', {
            addr: addr, module: module, 'class': className,
            interval_ms: intervalMs || 100
        });
        if (result && result.sub_id !== undefined) {
            this._subscriptions.set(result.sub_id, { addr, module, className });
            if (onDiff) this._diffListeners.set(result.sub_id, onDiff);
        }
        return result;
    }

    async unsubscribe(subId) {
        await this.send('mem.unsubscribe', { sub_id: subId });
        this._subscriptions.delete(subId);
        this._diffListeners.delete(subId);
    }

    async unsubscribeAll() {
        var promises = [];
        this._subscriptions.forEach((_, subId) => {
            promises.push(this.send('mem.unsubscribe', { sub_id: subId }).catch(function(){}));
        });
        await Promise.all(promises);
        this._subscriptions.clear();
        this._diffListeners.clear();
    }

    // Fetch full schema from server, returns D-shaped object
    async fetchSchema(onProgress) {
        onProgress = onProgress || function(){};

        onProgress('Fetching modules...');
        var modules = await this.send('schema.modules');
        var modNames = modules; // array of module name strings

        var result = { modules: [], globals: {} };
        var total = modNames.length;
        var done = 0;

        // Fetch all modules in parallel
        var promises = modNames.map(async (mn) => {
            var [classes, enums] = await Promise.all([
                this.send('schema.classes', { module: mn }),
                this.send('schema.enums', { module: mn })
            ]);

            // Fetch full class details in parallel
            var fullClasses = await Promise.all(classes.map(c =>
                this.send('schema.class', { module: mn, name: c.name })
            ));

            // Fetch full enum details in parallel
            var fullEnums = await Promise.all(enums.map(e =>
                this.send('schema.enum', { module: mn, name: e.name })
            ));

            done++;
            onProgress('Fetching module ' + done + '/' + total + ': ' + mn);

            return {
                name: mn,
                classes: fullClasses.map(c => ({
                    name: c.name,
                    size: c.size,
                    parent: c.parent || null,
                    inheritance: c.inheritance_chain && c.inheritance_chain.length ? c.inheritance_chain : (c.parent ? [c.name, c.parent] : null),
                    fields: (c.fields || []).map(f => ({
                        name: f.name,
                        type: f.type,
                        offset: f.offset,
                        size: f.size
                    })),
                    static_fields: (c.static_fields || []).map(f => ({
                        name: f.name,
                        type: f.type,
                        offset: f.offset,
                        size: f.size
                    })),
                    metadata: c.metadata || []
                })),
                enums: fullEnums.map(e => ({
                    name: e.name,
                    size: e.size,
                    values: (e.values || []).map(v => ({
                        name: v.name,
                        value: v.value
                    }))
                }))
            };
        });

        result.modules = await Promise.all(promises);

        // Fetch globals
        onProgress('Fetching globals...');
        try {
            var globalsList = await this.send('global.list');
            var globsByMod = {};
            globalsList.forEach(function(g) {
                var mn = g.module;
                if (!globsByMod[mn]) globsByMod[mn] = [];
                globsByMod[mn].push({
                    'class': g.class_name,
                    rva: g.global_rva,
                    vtable_rva: g.vtable_rva,
                    type: g.is_pointer ? 'pointer' : 'static',
                    has_schema: g.has_schema
                });
            });
            result.globals = globsByMod;
        } catch(e) { /* globals optional */ }

        onProgress('Done!');
        return result;
    }
}
